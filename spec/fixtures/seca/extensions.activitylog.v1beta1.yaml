openapi: 3.0.3
info:
  title: Activity Log
  version: v1beta1
  description: |
    The Activity Log API provides access to audit logs for all resources.
    This API is part of the Sovereign European Cloud API.
servers:
  - url: https://demo.secapi.cloud/providers/seca.activity-log
    description: Path Schema
  - url: https://activity-log.seca.demo.secapi.cloud
    description: DNS Schema
security:
  - bearerAuth: []
tags:
  - name: Activity Log
    description: Activity Log management
paths:
  /v1beta1/tenants/{tenant}/workspaces/{workspace}/activity-logs:
    get:
      tags:
        - Activity Log
      security:
        - bearerAuth: []
      summary: List activity logs
      description: |
        Lists activity logs and provides paginated, filtered access.
      operationId: listActivityLogs
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/workspacePathParam'
        - $ref: '#/components/parameters/labelSelector'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/skipTokenParam'
        - $ref: '#/components/parameters/acceptHeader'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityLogIterator'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '500':
          $ref: '#/components/responses/Error500'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Use a JWT token for authentication. The token identifies the user,
        and policies (RBAC, ABAC, or hybrid) determine authorization.
  schemas:
    ActivityLogIterator:
      description: Iterator for activity logs
      type: object
      required:
        - items
        - metadata
      properties:
        items:
          description: List of activity logs
          type: array
          items:
            $ref: '#/components/schemas/ActivityLog'
        metadata:
          $ref: '#/components/schemas/ResponseMetadata'
    NameMetadata:
      type: object
      readOnly: true
      required:
        - name
      description: Metadata for resource names
      properties:
        name:
          type: string
          description: |
            Resource identifier in dash-case (kebab-case) format. Must start and end with an alphanumeric character.
            Can contain lowercase letters, numbers, and hyphens. Multiple segments can be joined with dots.
            Each segment follows the same rules.
          minLength: 1
          maxLength: 128
          pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
          example: resource-name
    PermissionMetadata:
      type: object
      readOnly: true
      description: Metadata for permission management
      required:
        - provider
        - resource
        - verb
      properties:
        provider:
          type: string
          minLength: 1
          maxLength: 64
          example: seca.compute/v1
        resource:
          type: string
          minLength: 1
          maxLength: 256
          example: tenants/tn-1/workspaces/ws-1/instances/my-server
        verb:
          type: string
          minLength: 1
          maxLength: 7
          example: get
      example:
        provider: seca.compute/v1
        resource: tenants/tn-1/workspaces/ws-1/instances/my-server
        verb: get
    ModificationMetadata:
      type: object
      readOnly: true
      description: Base metadata for all resources with optional region references
      required:
        - createdAt
        - lastModifiedAt
        - resourceVersion
      properties:
        createdAt:
          type: string
          format: date-time
          description: Indicates the time when the resource was created. The field is set by the provider and should not be modified by the user.
        deletedAt:
          type: string
          format: date-time
          description: If set, indicates the time when the resource was marked for deletion. Resources with this field set are considered pending deletion.
        lastModifiedAt:
          type: string
          format: date-time
          description: Indicates the time when the resource was created or last modified. Field is used for "If-Unmodified-Since" logic for concurrency control. The provider guarantees that a modification on a single resource can happen only once every millisecond.
        resourceVersion:
          type: integer
          description: Incremented on every modification of the resource. Used for optimistic concurrency control.
          minimum: 1
          format: int64
    ReferenceURN:
      type: string
      minLength: 1
      description: |
        A unique resource name (URN) used to identify and reference this resource.

        The URN is NOT a URL — it does not contain a protocol scheme (http/https), a host,
        or any endpoint-specific prefix. It is a portable, transport-agnostic identifier.
        A configured SDK client — which knows the provider's base URL and endpoint mapping —
        can derive a URL from a URN, but the URN alone cannot be turned into a URL without
        that SDK configuration context. This separation keeps the URN portable across
        environments and CSP deployments.

        The full URN format is:
          `{provider}/{version}/tenants/{tenant}/workspaces/{workspace}/{type}/{name}`

        For hierarchical (nested) resources, additional parent path segments are included:
          `seca.network/v1/tenants/tn-1/workspaces/ws-1/networks/my-net/route-tables/my-rt`

        ### Automatic Prefix Inference

        In most cases, the prefix of the URN can be automatically derived in the given context.
        To simplify usage, only the resource type and name might be specified as a reference
        using the `<type>/<name>` notation. The suffix can be made more specific by adding
        additional segments separated by slashes.

        The prefix is automatically inferred from the context. For example, if the resource is a
        block storage in the same workspace the reference can be specified as
        `block-storages/my-block-storage`. If the resource is a block storage in a different workspace, the
        reference can be specified as `workspaces/ws-1/block-storages/my-block-storage`.

        For automatic prefix inference, the following rules apply:
        - the version is inferred from the current resource version
        - the workspace is inferred from the current workspace
        - the region is inferred from the current region
        - the provider is inferred from the type and context of the usage

        The prefix inference is resolved on admission into the full URN format, which makes it
        mostly suitable for human use.
      maxLength: 255
      example: seca.compute/v1/tenants/tn-1/workspaces/ws-1/instances/my-server
    TypeMetadata:
      type: object
      readOnly: true
      required:
        - apiVersion
        - kind
        - ref
      description: |
        Metadata for all resources with type information.
      properties:
        apiVersion:
          type: string
          description: API version of the resource
          minLength: 1
          maxLength: 16
          default: v1
        kind:
          type: string
          description: Type of the resource
          enum:
            - activity-log
            - block-storage
            - image
            - instance
            - instance-sku
            - internet-gateway
            - network
            - network-load-balancer
            - network-sku
            - nic
            - object-storage-account
            - public-ip
            - region
            - role
            - role-assignment
            - routing-table
            - security-group
            - security-group-rule
            - storage-sku
            - subnet
            - workspace
          x-enumNames:
            - ResourceKindActivityLog
            - ResourceKindBlockStorage
            - ResourceKindImage
            - ResourceKindInstance
            - ResourceKindInstanceSku
            - ResourceKindInternetGateway
            - ResourceKindNetwork
            - ResourceKindNetworkLoadBalancer
            - ResourceKindNetworkSku
            - ResourceKindNic
            - ResourceKindObjectStorageAccount
            - ResourceKindPublicIP
            - ResourceKindRegion
            - ResourceKindRole
            - ResourceKindRoleAssignment
            - ResourceKindRoutingTable
            - ResourceKindSecurityGroup
            - ResourceKindSecurityGroupRule
            - ResourceKindStorageSku
            - ResourceKindSubnet
            - ResourceKindWorkspace
        ref:
          $ref: '#/components/schemas/ReferenceURN'
    TenantMetadata:
      type: object
      description: Metadata for resources with tenant constraints
      readOnly: true
      required:
        - tenant
      properties:
        tenant:
          type: string
          description: Tenant identifier
          minLength: 1
          maxLength: 64
    WorkspaceMetadata:
      type: object
      description: Metadata for resources with workspace constraints
      readOnly: true
      required:
        - workspace
      properties:
        workspace:
          type: string
          description: Workspace identifier
          minLength: 1
          maxLength: 64
    RegionalMetadata:
      type: object
      description: Metadata for regional resources
      readOnly: true
      required:
        - region
      properties:
        region:
          type: string
          description: Reference to the region where the resource is located
          minLength: 1
          maxLength: 64
          example: eu-central-1
    RegionalWorkspaceResourceMetadata:
      description: |
        Metadata for regional resources with name, permission, modification, type, tenant and workspace and region information.
      allOf:
        - $ref: '#/components/schemas/NameMetadata'
        - $ref: '#/components/schemas/PermissionMetadata'
        - $ref: '#/components/schemas/ModificationMetadata'
        - $ref: '#/components/schemas/TypeMetadata'
        - $ref: '#/components/schemas/TenantMetadata'
        - $ref: '#/components/schemas/WorkspaceMetadata'
        - $ref: '#/components/schemas/RegionalMetadata'
    Reference:
      type: object
      description: |
        A reference to a resource using an object. The object contains the
        same information as the ReferenceURN, but is represented as a structured object.
        The advantage of this representation is that it can be used to reference
        resources in different workspaces or regions without the need to specify
        the full URN.
      required:
        - resource
      properties:
        region:
          type: string
          x-go-type-skip-optional-pointer: true
          description: |
            Region of the resource. If not set, the region is inferred from the context.
          maxLength: 64
          example: eu-central-1
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-max-length: '64'
        provider:
          type: string
          x-go-type-skip-optional-pointer: true
          description: |
            Provider of the resource. If not set, the provider is inferred from the context.
          maxLength: 64
          example: seca.compute/v1
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-max-length: '64'
        tenant:
          type: string
          x-go-type-skip-optional-pointer: true
          description: |
            Tenant of the resource. If not set, the tenant is inferred from the context.
          maxLength: 64
          example: tenant-1
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-max-length: '64'
        workspace:
          type: string
          x-go-type-skip-optional-pointer: true
          description: |
            Workspace of the resource. If not set, the workspace is inferred from the context.
          maxLength: 64
          example: workspace-1
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-max-length: '64'
        resource:
          type: string
          description: |
            Resource-specific path identifying the resource within its workspace context.
            This is the segment of the full URN after the provider, version, tenant, and
            workspace parts. For a flat resource it is `<type>/<name>`, and for hierarchical
            (nested) resources it includes the parent path segments:
              `networks/<network-name>/route-tables/<rt-name>`
            The provider, tenant, and workspace can be specified as separate fields in this
            object; they do not need to be repeated here.
          minLength: 1
          maxLength: 256
          example: instances/my-server
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-min-length: '1'
            x-kubebuilder-validation-max-length: '256'
    BlockStorageSpec:
      type: object
      description: |
        References the SKU used for this block.
        If a reference to the source image is used as the base for creating this block storage.
      required:
        - skuRef
        - sizeGB
      properties:
        skuRef:
          allOf:
            - $ref: '#/components/schemas/Reference'
          description: |
            Reference to the SKU of the block storage. The SKU is immutable after creation.
            If you want to change the SKU, you need to create a new block storage and migrate the data.
          example:
            resource: tenants/seca/skus/n1k
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: self == oldSelf
            x-cel-message-0: spec.skuRef is immutable
        sizeGB:
          type: integer
          description: Size of the block storage in GB.
          minimum: 1
          maximum: 1000000
          example: 10
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: self >= oldSelf
            x-cel-message-0: spec.sizeGB cannot be decreased
            x-kubebuilder-validation-minimum: '1'
            x-kubebuilder-validation-maximum: '1000000'
        sourceImageRef:
          allOf:
            - $ref: '#/components/schemas/Reference'
          description: Reference to the source image used as the base for creating the block storage.
          example:
            resource: images/image-123
    InstanceSkuSpec:
      type: object
      description: |
        Specification of the instance SKU, including its capabilities and extensions.
      required:
        - vCPU
        - ram
      properties:
        vCPU:
          type: integer
          description: |
            The number of virtual CPUs (vCPUs) allocated to the instance SKU.
            This value represents the number of cores visible to the operating system.
            It does not specify the number of physical processors or hyper-threads available.
          minimum: 1
          maximum: 60
          example: 2
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-minimum: '1'
            x-kubebuilder-validation-maximum: '60'
        ram:
          type: integer
          description: |
            The amount of RAM (Random Access Memory) allocated to the instance SKU in gigabytes.
            This value represents the total memory available to the instance.
          minimum: 1
          maximum: 65536
          example: 230
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-minimum: '1'
            x-kubebuilder-validation-maximum: '65536'
    Zone:
      type: string
      description: Reference to a specific zone within a region
      minLength: 1
      maxLength: 32
      example: a
    VolumeReference:
      type: object
      description: Represents a connection between a Block Storage and an a user of the block storage.
      required:
        - deviceRef
      properties:
        deviceRef:
          allOf:
            - $ref: '#/components/schemas/Reference'
          description: Reference to the block storage used to store the volume.
          example:
            resource: block-storages/block-123
        type:
          type: string
          x-go-type-skip-optional-pointer: true
          description: The connection type depends on the type of device and type of block storage.
          enum:
            - virtio
          default: virtio
          x-enumNames:
            - VolumeReferenceTypeVirtio
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-enum: virtio
            x-kubebuilder-validation-max-length: '7'
            x-kubebuilder-default: virtio
      example:
        deviceRef:
          resource: block-storages/block-123
        type: virtio
    InstanceSpec:
      type: object
      description: |
        Specification of the instance, including its SKU, network configuration, and storage options.
      required:
        - skuRef
        - zone
        - bootVolume
      properties:
        skuRef:
          allOf:
            - $ref: '#/components/schemas/Reference'
          description: |
            Reference to the SKU of the instance. The SKU is immutable after the instance is created.
            To change the SKU, the instance must be deleted and recreated with the new SKU reference.
          example:
            resource: tenants/seca/skus/s
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: self == oldSelf
            x-cel-message-0: spec.skuRef is immutable
        primaryNicRef:
          allOf:
            - $ref: '#/components/schemas/Reference'
          description: Reference to the primary NIC attached to this instance.
          example:
            provider: seca.network/v1
            resource: network-interfaces/nic-123
            ref: seca.network/v1/tenants/tn-1/workspaces/ws-1/network-interfaces/nic-123
        additionalNicRefs:
          type: array
          x-go-type-skip-optional-pointer: true
          maxItems: 16
          description: Additional NICs attached to this instance
          items:
            allOf:
              - $ref: '#/components/schemas/Reference'
            description: Reference to an additional NIC attached to this instance.
            example:
              provider: seca.network/v1
              resource: network-interfaces/nic-124
              ref: seca.network/v1/tenants/tn-1/workspaces/ws-1/network-interfaces/nic-124
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-max-items: '16'
        zone:
          allOf:
            - $ref: '#/components/schemas/Zone'
          description: |
            The zone in which the instance is deployed. The zone is immutable after the instance is created.
            To change the zone, the instance must be deleted and recreated with the new zone.
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: self == oldSelf
            x-cel-message-0: spec.zone is immutable
            x-kubebuilder-validation-min-length: '1'
            x-kubebuilder-validation-max-length: '32'
        securityGroupRef:
          allOf:
            - $ref: '#/components/schemas/Reference'
          description: Reference to the security group associated with this instance.
          example:
            provider: seca.network/v1
            resource: security-groups/sg-123
            ref: seca.network/v1/tenants/tn-1/workspaces/ws-1/security-groups/sg-123
        userData:
          type: string
          x-go-type-skip-optional-pointer: true
          description: |
            Cloud-init user data for instance initialization
            Example cloud-init user configuration with SSH key:
          maxLength: 65536
          example: |
            #cloud-config
            packages:
            - nginx
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-max-length: '65536'
        antiAffinityGroup:
          description: |
            Anti-affinity group to which this instance belongs.
            Instances in the same anti-affinity group are placed on different physical hosts.
            The number of maximum instances in an anti-affinity group is provider-specific.
          type: string
          x-go-type-skip-optional-pointer: true
          maxLength: 64
          example: exclusive-server
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-max-length: '64'
        sshKeys:
          type: array
          x-go-type-skip-optional-pointer: true
          maxItems: 32
          items:
            type: string
            minLength: 1
            maxLength: 4096
            x-oapi-codegen-extra-tags:
              x-kubebuilder-validation-max-length: '4096'
          description: |
            Provider-specific references to SSH keys used in cloud-init vendorData.
            These references are used to inject SSH public keys during instance initialization
            through cloud-init's vendor data configuration.
          example:
            - ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQC0g...
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-items-min-length: '1'
            x-kubebuilder-validation-items-max-length: '4096'
            x-kubebuilder-validation-max-items: '32'
        bootVolume:
          allOf:
            - $ref: '#/components/schemas/VolumeReference'
          description: Reference to the block storage used to store the boot volume of the instance.
        dataVolumes:
          type: array
          x-go-type-skip-optional-pointer: true
          maxItems: 64
          items:
            allOf:
              - $ref: '#/components/schemas/VolumeReference'
            description: Reference to the block storage used to store an additional volume of the instance.
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-max-items: '64'
      example:
        skuRef:
          resource: tenants/seca/skus/s
        zone: a
        bootVolume:
          deviceRef:
            provider: seca.storage/v1
            resource: block-storages/block-123
          type: virtio
    NetworkLoadBalancerPort:
      type: integer
      description: Load Balancer port to receive or forward the traffic
      minimum: 1
      maximum: 65535
      example: 443
      x-oapi-codegen-extra-tags:
        x-kubebuilder-validation-minimum: '1'
        x-kubebuilder-validation-maximum: '65535'
    LoadBalancerHealthCheck:
      type: object
      description: Optional port health check. It probes the port with protocol.
      required:
        - interval
        - timeout
        - retry
      properties:
        type:
          type: string
          x-go-type-skip-optional-pointer: true
          description: |
            Specifies the type of health check. A `connect` health check attempts
            to establish a connection to the specified port to determine its health.
          enum:
            - connect
          x-enumNames:
            - LoadBalancerHealthCheckConnect
          default: connect
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-enum: connect
            x-kubebuilder-default: connect
        interval:
          type: integer
          description: health check interval in seconds. It means after how many seconds it will take a new check
          minimum: 1
          maximum: 86400
          example: 10
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-minimum: '1'
            x-kubebuilder-validation-maximum: '86400'
        timeout:
          type: integer
          description: health check in seconds. It means after how many seconds the attempt will be considered unhealthy
          minimum: 1
          maximum: 600
          example: 5
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-minimum: '1'
            x-kubebuilder-validation-maximum: '600'
        retry:
          type: integer
          description: health check retry number after considered unhealthy a backend instance
          minimum: 0
          maximum: 10
          example: 3
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-minimum: '0'
            x-kubebuilder-validation-maximum: '10'
    LoadBalancerTarget:
      type: object
      description: The target of the LoadBalancer. It can be a set of instances nics. The port can be different from the frontend port, if omitted it will be the same. If no health check is specified, the LoadBalancer will not check the health of the backend instances.
      required:
        - members
      properties:
        algorithm:
          type: string
          x-go-type-skip-optional-pointer: true
          description: LoadBalancer algorithm to take a backend instance
          enum:
            - round-robin
          x-enumNames:
            - LoadBalancerAlgorithmRoundRobin
          default: round-robin
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-enum: round-robin
            x-kubebuilder-default: round-robin
        port:
          allOf:
            - $ref: '#/components/schemas/NetworkLoadBalancerPort'
          description: Backend port to which the load balancer will be forwarding the traffic to
        members:
          type: array
          minItems: 1
          maxItems: 1000
          description: Nic reference to the members as part of the LoadBalancerTarget
          items:
            allOf:
              - $ref: '#/components/schemas/Reference'
            description: Reference to the NIC of a backend instance.
            example:
              provider: seca.network/v1
              resource: nics/nic-1
              ref: seca.network/v1/tenants/tn-1/workspaces/ws-1/nics/nic-1
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-min-items: '1'
            x-kubebuilder-validation-max-items: '1000'
        healthCheck:
          $ref: '#/components/schemas/LoadBalancerHealthCheck'
        proxyProtocol:
          type: string
          x-go-type-skip-optional-pointer: true
          description: |
            Specifies the proxy protocol version. The proxy protocol is used to
            pass client connection information to the backend instances.
            If not specified, the default is `none`.
          enum:
            - none
            - v2
          x-enumNames:
            - LoadBalancerProxyProtocolNone
            - LoadBalancerProxyProtocolV2
          default: none
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-enum: none;v2
            x-kubebuilder-default: none
      example:
        members:
          - provider: seca.network/v1
            resource: nics/nic-1
          - provider: seca.network/v1
            resource: nics/nic-2
        healthCheck:
          interval: 10
          timeout: 5
          retry: 3
    NetworkLoadBalancerFrontend:
      type: object
      description: |
        Represents the frontend configuration of the LoadBalancer. Each frontend
        can have multiple targets, but the combination of port and protocol must
        be unique to ensure proper routing.
      required:
        - protocol
        - port
        - target
      properties:
        protocol:
          type: string
          description: Frontend Protocol to which the load balancer will be listening on
          enum:
            - tcp
            - udp
            - both
          x-enumNames:
            - LoadBalancerProtocolTCP
            - LoadBalancerProtocolUDP
            - LoadBalancerProtocolBoth
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-enum: tcp;udp;both
        port:
          allOf:
            - $ref: '#/components/schemas/NetworkLoadBalancerPort'
          description: Frontend port to which the load balancer will be listening on
        target:
          $ref: '#/components/schemas/LoadBalancerTarget'
    NetworkLoadBalancerSpec:
      type: object
      description: |
        Defines the specification for a Network Load Balancer. A Load Balancer can have multiple
        frontends, where each frontend may target multiple backend instances. Frontend ports and
        protocols must be unique to ensure proper routing. The NIC associated with the proxy
        determines whether the Load Balancer is internal or external.
      required:
        - nicRef
        - frontends
      properties:
        nicRef:
          allOf:
            - $ref: '#/components/schemas/Reference'
          description: Reference to the NIC attached to the load balancer.
          example:
            provider: seca.network/v1
            resource: nics/lb-1
            ref: seca.network/v1/tenants/tn-1/workspaces/ws-1/nics/lb-1
        securityGroupRef:
          allOf:
            - $ref: '#/components/schemas/Reference'
          description: Reference to the security group associated with this instance.
          example:
            provider: seca.network/v1
            resource: security-groups/sg-123
