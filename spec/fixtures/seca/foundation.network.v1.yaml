          - destinationCidrBlock: '::/0'
            targetRef:
              resource: internet-gateways/internet-gateway-1
    RouteStatus:
      description: |
        The status of the route. The status is read-only and will be set by the
        system. The status contains information about the current state of the route
        and its target. It will report the status of the target and the route as a whole.
      allOf:
        - $ref: '#/components/schemas/Status'
        - type: object
          readOnly: true
          description: |
            The status of the route. If the `targetRef` is invalid,
            the status will be `error`. If the route is valid the status
            will be `active`. If the route is referencing a target that
