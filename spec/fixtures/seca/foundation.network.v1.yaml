openapi: 3.0.3
info:
  title: Network
  version: v1
  description: |
    The Network Foundation API provides access to network resources, including Networks, NICs, security groups, subnets, and routing tables.
    This API is part of the Sovereign European Cloud API.
servers:
  - url: https://demo.secapi.cloud/providers/seca.network
    description: Path Schema
  - url: https://network.seca.demo.secapi.cloud
    description: DNS Schema
security:
  - bearerAuth: []
tags:
  - name: Sku
    description: Sku management
  - name: Security Group
    description: Security Group management
  - name: Security Group Rule
    description: Security Group Rule management
  - name: Nic
    description: Nic management
  - name: Public Ip
    description: Public Ip management
  - name: Network
    description: Network management
  - name: Internet Gateway
    description: Internet Gateway management
  - name: Subnet
    description: Subnet management
  - name: Route-Table
    description: Route-Table management
paths:
  /v1/tenants/{tenant}/skus:
    get:
      tags:
        - Sku
      security:
        - bearerAuth: []
      summary: List skus
      description: |
        Retrieves a list of available SKU (Stock Keeping Unit) configurations for network resources.
        Not all bandwidth tiers are available for all instances in all regions.

        ## Available SECA Network SKUs with their capabilities
        Network SKUs represent guaranteed bandwidth performance for 95% of time within a 24h period.

        | Tier | Bandwidth | Packets per second |
        |-|-|-|
        | N1K  | 1 Gbit/s | 10000 packets/s |
        | N5K  | 5 Gbit/s | 40000 packets/s |
        | N10K | 10 Gbit/s | 80000 packets/s |
      operationId: listSkus
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/labelSelector'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/skipTokenParam'
        - $ref: '#/components/parameters/acceptHeader'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkuIterator'
              example:
                items:
                  - labels:
                      provider: seca
                      tier: N1K
                    metadata:
                      apiVersion: v1
                      kind: network-sku
                      name: seca.n1k
                      provider: seca.network/v1
                      ref: seca.network/v1/tenants/tn-1/skus/seca.n1k
                      region: eu-central-1
                      resource: tenants/tn-1/skus/seca.n1k
                      tenant: ts-1
                      verb: get
                    spec:
                      bandwidth: 1000
                      packets: 10000
                  - labels:
                      provider: seca
                      tier: N5K
                    metadata:
                      apiVersion: v1
                      kind: network-sku
                      name: seca.n5k
                      provider: seca.network/v1
                      ref: seca.network/v1/tenants/tn-1/skus/seca.n5k
                      region: eu-central-1
                      resource: tenants/tn-1/skus/seca.n5k
                      tenant: ts-1
                      verb: get
                    spec:
                      bandwidth: 5000
                      packets: 40000
                  - labels:
                      provider: seca
                      tier: N10K
                    metadata:
                      apiVersion: v1
                      kind: network-sku
                      name: seca.n10k
                      provider: seca.network/v1
                      ref: seca.network/v1/tenants/tn-1/skus/seca.n10k
                      region: eu-central-1
                      resource: tenants/tn-1/skus/seca.n10k
                      tenant: ts-1
                      verb: get
                    spec:
                      bandwidth: 10000
                      packets: 80000
                metadata:
                  provider: seca.network/v1
                  resource: tenants/1/skus
                  skipToken: 'false'
                  verb: list
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '500':
          $ref: '#/components/responses/Error500'
  /v1/tenants/{tenant}/skus/{name}:
    get:
      tags:
        - Sku
      security:
        - bearerAuth: []
      summary: Get sku
      description: |
        Get a specific sku, useful for polling status updates of resources.
        A `404` response without proper schema has to be ignored and must be
