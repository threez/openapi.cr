            x-kubebuilder-validation-max-length: '43'
        targetRef:
          allOf:
            - $ref: '#/components/schemas/Reference'
          description: Reference to the target of the route. The target can be an instance, an gateway or an IP address.
          example:
            resource: internet-gateways/internet-gateway-1
    RouteTableSpec:
      type: object
      description: |
        The RouteTableSpec defines the routes that are associated with the route table.
      required:
