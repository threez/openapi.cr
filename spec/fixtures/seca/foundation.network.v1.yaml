        type: string
        minLength: 1
        maxLength: 64
      description: Tenant ID
    labelSelector:
      in: query
      name: labels
      description: |
        Filter resources by their labels. Multiple filters are combined with comma.
        Filter syntax:
          - Equals: key=value
          - Not equals: key!=value
          - Wildcards: \*key\*=\*value\* - substring (contains) match on both key and value. Each `*` can appear at start, end or in the middle to mean "any characters". Example: \*env\*=\*prod\* matches a label key containing "env" whose value contains "prod".
          - Numeric: key>value, key<value, key>=value, key<=value
          - Namespaced key examples: 'monitoring:alert-level=high' or 'billing:team=platform'
      required: false
      schema:
        type: string
        example: cloud:region=us-east-1,billing:team=platform,tier!=dev
    limitParam:
      in: query
      name: limit
      description: Maximum number of resources to return in the response
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 10000
        default: 1000
    skipTokenParam:
      in: query
