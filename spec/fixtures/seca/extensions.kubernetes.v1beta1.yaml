openapi: 3.0.3
info:
  title: Kubernetes
  version: v1beta1
  description: |
    The Kubernetes API provides access to Kubernetes resources.
    This API is part of the Sovereign European Cloud API.
servers:
  - url: https://demo.secapi.cloud/providers/seca.kubernetes
    description: Path Schema
  - url: https://kubernetes.seca.demo.secapi.cloud
    description: DNS Schema
security:
  - bearerAuth: []
tags:
  - name: Cluster
    description: Cluster management
  - name: Node-Pool
    description: Node-Pool management
paths:
  /v1beta1/tenants/{tenant}/workspaces/{workspace}/clusters:
    get:
      tags:
        - Cluster
      security:
        - bearerAuth: []
      summary: List clusters
      description: |
        Lists clusters and provides paginated, filtered access.
      operationId: listClusters
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/workspacePathParam'
        - $ref: '#/components/parameters/labelSelector'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/skipTokenParam'
        - $ref: '#/components/parameters/acceptHeader'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterIterator'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '500':
          $ref: '#/components/responses/Error500'
  /v1beta1/tenants/{tenant}/workspaces/{workspace}/clusters/{name}:
    get:
      tags:
        - Cluster
      security:
        - bearerAuth: []
      summary: Get cluster
      description: |
        Get a specific cluster, useful for polling status updates of resources.
        A `404` response without proper schema has to be ignored and must be
        understood as server being unavailable. Only a response with proper schema
        can be trusted.
      operationId: getCluster
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/workspacePathParam'
        - $ref: '#/components/parameters/resourcePathParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KubernetesCluster'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'
    put:
      tags:
        - Cluster
      security:
        - bearerAuth: []
      summary: Create or update cluster
      description: |
        Creates or updates a cluster. The return code of the endpoint
        provides indicates if the resource was created or updated. A client
        must accept both as successful response to the request.
      operationId: createOrUpdateCluster
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/workspacePathParam'
        - $ref: '#/components/parameters/resourcePathParam'
        - $ref: '#/components/parameters/ifUnmodifiedSince'
      requestBody:
        description: |
          Any provided `metadata` on the cluster will be ignored by the resource server.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KubernetesCluster'
      responses:
        '200':
          description: |
            Cluster successfully updated, doesn't indicate successful
            resource provisioning.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KubernetesCluster'
        '201':
          description: |
            Cluster successfully created, doesn't indicate successful
            resource provisioning.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KubernetesCluster'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'
        '412':
          $ref: '#/components/responses/Error412'
        '422':
          $ref: '#/components/responses/Error422'
        '500':
          $ref: '#/components/responses/Error500'
    delete:
      tags:
        - Cluster
      security:
        - bearerAuth: []
      summary: Delete cluster
      description: |
        Deletes a cluster using the given name. In case the resource workspace
        already deleted `404` is returned. For failure tolerance in case of retry the
        client needs to accept `404` and `202` as a successful deletion. In case the
        client tries to delete a resource for the first time and gets a `404`, the
        resource might not exist for other reasons or never existed in the first 
        place. This can't be assumed as a safe deletion of the resource. 
        If deletion of the resource takes longer deletion can be 
        issued multiple times with the same result `202`, in all cased the resource
        will be only deleted once. A client must verify the client response to contain
        a proper error schema. A `404` response without proper schema has to be ignored
        and understood as server unavailable error.
      operationId: deleteCluster
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/workspacePathParam'
        - $ref: '#/components/parameters/resourcePathParam'
        - $ref: '#/components/parameters/ifUnmodifiedSince'
      responses:
        '202':
          description: Cluster deletion accepted
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'
        '412':
          $ref: '#/components/responses/Error412'
        '500':
          $ref: '#/components/responses/Error500'
  /v1beta1/tenants/{tenant}/workspaces/{workspace}/clusters/{cluster}/node-pools:
    get:
      tags:
        - Node-Pool
      security:
        - bearerAuth: []
      summary: List node-pools
      description: |
        Lists node-pools and provides paginated, filtered access.
      operationId: listNode-Pools
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/workspacePathParam'
        - $ref: '#/components/parameters/clusterPathParam'
        - $ref: '#/components/parameters/labelSelector'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/skipTokenParam'
        - $ref: '#/components/parameters/acceptHeader'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node-PoolIterator'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '500':
          $ref: '#/components/responses/Error500'
  /v1beta1/tenants/{tenant}/workspaces/{workspace}/clusters/{cluster}/node-pools/{name}:
    get:
      tags:
        - Node-Pool
      security:
        - bearerAuth: []
      summary: Get node-pool
      description: |
        Get a specific node-pool, useful for polling status updates of resources.
        A `404` response without proper schema has to be ignored and must be
        understood as server being unavailable. Only a response with proper schema
        can be trusted.
      operationId: getNode-Pool
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/workspacePathParam'
        - $ref: '#/components/parameters/clusterPathParam'
        - $ref: '#/components/parameters/resourcePathParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KubernetesNodePool'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'
    put:
      tags:
        - Node-Pool
      security:
        - bearerAuth: []
      summary: Create or update node-pool
      description: |
        Creates or updates a node-pool. The return code of the endpoint
        provides indicates if the resource was created or updated. A client
        must accept both as successful response to the request.
      operationId: createOrUpdateNode-Pool
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/workspacePathParam'
        - $ref: '#/components/parameters/clusterPathParam'
        - $ref: '#/components/parameters/resourcePathParam'
        - $ref: '#/components/parameters/ifUnmodifiedSince'
      requestBody:
        description: |
          Any provided `metadata` on the node-pool will be ignored by the resource server.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KubernetesNodePool'
      responses:
        '200':
          description: |
            Node-Pool successfully updated, doesn't indicate successful
            resource provisioning.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KubernetesNodePool'
        '201':
          description: |
            Node-Pool successfully created, doesn't indicate successful
            resource provisioning.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KubernetesNodePool'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'
        '412':
          $ref: '#/components/responses/Error412'
        '422':
          $ref: '#/components/responses/Error422'
        '500':
          $ref: '#/components/responses/Error500'
    delete:
      tags:
        - Node-Pool
      security:
        - bearerAuth: []
      summary: Delete node-pool
      description: |
        Deletes a node-pool using the given name. In case the resource workspace
        already deleted `404` is returned. For failure tolerance in case of retry the
        client needs to accept `404` and `202` as a successful deletion. In case the
        client tries to delete a resource for the first time and gets a `404`, the
        resource might not exist for other reasons or never existed in the first 
        place. This can't be assumed as a safe deletion of the resource. 
        If deletion of the resource takes longer deletion can be 
        issued multiple times with the same result `202`, in all cased the resource
        will be only deleted once. A client must verify the client response to contain
        a proper error schema. A `404` response without proper schema has to be ignored
        and understood as server unavailable error.
      operationId: deleteNode-Pool
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/workspacePathParam'
        - $ref: '#/components/parameters/clusterPathParam'
        - $ref: '#/components/parameters/resourcePathParam'
        - $ref: '#/components/parameters/ifUnmodifiedSince'
      responses:
        '202':
          description: Node-Pool deletion accepted
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'
        '412':
          $ref: '#/components/responses/Error412'
        '500':
          $ref: '#/components/responses/Error500'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Use a JWT token for authentication. The token identifies the user,
        and policies (RBAC, ABAC, or hybrid) determine authorization.
  schemas:
    ClusterIterator:
      description: Iterator for clusters
      type: object
      required:
        - items
        - metadata
      properties:
        items:
          description: List of clusters
          type: array
          items:
            $ref: '#/components/schemas/KubernetesCluster'
        metadata:
          $ref: '#/components/schemas/ResponseMetadata'
    Node-PoolIterator:
      description: Iterator for node-pools
      type: object
      required:
        - items
        - metadata
      properties:
        items:
          description: List of node-pools
          type: array
          items:
            $ref: '#/components/schemas/KubernetesNodePool'
        metadata:
          $ref: '#/components/schemas/ResponseMetadata'
    Labels:
      x-go-type-skip-optional-pointer: true
      type: object
      description: |
        User-defined key/value pairs that are mutable and can be used to
        organize and categorize resources. They can be used to filter resources.
        The number of labels is eventually limited by the CSP.
      additionalProperties:
        type: string
        maxLength: 63
      example:
        env: production
    Annotations:
      x-go-type-skip-optional-pointer: true
      type: object
      description: |
        User-defined key/value pairs that are mutable and can be used to add annotations.
        The number of annotations is eventually limited by the CSP.
      additionalProperties:
        type: string
        maxLength: 1024
      example:
        description: Human readable description
    Extensions:
      x-go-type-skip-optional-pointer: true
      type: object
      description: |
        User-defined key/value pairs that are mutable and can be used to add extensions.
        Extensions are subject to validation by the CSP, and any value that is not accepted will be rejected during admission.
      additionalProperties:
        type: string
    UserResourceMetadata:
      type: object
      description: Metadata for user-defined resource properties
      properties:
        labels:
          $ref: '#/components/schemas/Labels'
        annotations:
          $ref: '#/components/schemas/Annotations'
        extensions:
          $ref: '#/components/schemas/Extensions'
    NameMetadata:
      type: object
      readOnly: true
      required:
        - name
      description: Metadata for resource names
      properties:
        name:
          type: string
          description: |
            Resource identifier in dash-case (kebab-case) format. Must start and end with an alphanumeric character.
            Can contain lowercase letters, numbers, and hyphens. Multiple segments can be joined with dots.
            Each segment follows the same rules.
          minLength: 1
          maxLength: 128
          pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
          example: resource-name
    PermissionMetadata:
      type: object
      readOnly: true
      description: Metadata for permission management
      required:
        - provider
        - resource
        - verb
      properties:
        provider:
          type: string
          minLength: 1
          maxLength: 64
          example: seca.compute/v1
        resource:
          type: string
          minLength: 1
          maxLength: 256
          example: tenants/tn-1/workspaces/ws-1/instances/my-server
        verb:
          type: string
          minLength: 1
          maxLength: 7
          example: get
      example:
        provider: seca.compute/v1
        resource: tenants/tn-1/workspaces/ws-1/instances/my-server
        verb: get
    ModificationMetadata:
      type: object
      readOnly: true
      description: Base metadata for all resources with optional region references
      required:
        - createdAt
        - lastModifiedAt
        - resourceVersion
      properties:
        createdAt:
          type: string
          format: date-time
          description: Indicates the time when the resource was created. The field is set by the provider and should not be modified by the user.
        deletedAt:
          type: string
          format: date-time
          description: If set, indicates the time when the resource was marked for deletion. Resources with this field set are considered pending deletion.
        lastModifiedAt:
          type: string
          format: date-time
          description: Indicates the time when the resource was created or last modified. Field is used for "If-Unmodified-Since" logic for concurrency control. The provider guarantees that a modification on a single resource can happen only once every millisecond.
        resourceVersion:
          type: integer
          description: Incremented on every modification of the resource. Used for optimistic concurrency control.
          minimum: 1
          format: int64
    ReferenceURN:
      type: string
      minLength: 1
      description: |
        A unique resource name (URN) used to identify and reference this resource.

        The URN is NOT a URL — it does not contain a protocol scheme (http/https), a host,
        or any endpoint-specific prefix. It is a portable, transport-agnostic identifier.
        A configured SDK client — which knows the provider's base URL and endpoint mapping —
        can derive a URL from a URN, but the URN alone cannot be turned into a URL without
        that SDK configuration context. This separation keeps the URN portable across
        environments and CSP deployments.

        The full URN format is:
          `{provider}/{version}/tenants/{tenant}/workspaces/{workspace}/{type}/{name}`

        For hierarchical (nested) resources, additional parent path segments are included:
          `seca.network/v1/tenants/tn-1/workspaces/ws-1/networks/my-net/route-tables/my-rt`

        ### Automatic Prefix Inference

        In most cases, the prefix of the URN can be automatically derived in the given context.
        To simplify usage, only the resource type and name might be specified as a reference
        using the `<type>/<name>` notation. The suffix can be made more specific by adding
        additional segments separated by slashes.

        The prefix is automatically inferred from the context. For example, if the resource is a
        block storage in the same workspace the reference can be specified as
        `block-storages/my-block-storage`. If the resource is a block storage in a different workspace, the
        reference can be specified as `workspaces/ws-1/block-storages/my-block-storage`.

        For automatic prefix inference, the following rules apply:
        - the version is inferred from the current resource version
        - the workspace is inferred from the current workspace
        - the region is inferred from the current region
        - the provider is inferred from the type and context of the usage

        The prefix inference is resolved on admission into the full URN format, which makes it
        mostly suitable for human use.
      maxLength: 255
      example: seca.compute/v1/tenants/tn-1/workspaces/ws-1/instances/my-server
    TypeMetadata:
      type: object
      readOnly: true
      required:
        - apiVersion
        - kind
        - ref
      description: |
        Metadata for all resources with type information.
      properties:
        apiVersion:
          type: string
          description: API version of the resource
          minLength: 1
          maxLength: 16
          default: v1
        kind:
          type: string
          description: Type of the resource
          enum:
            - activity-log
            - block-storage
            - image
            - instance
            - instance-sku
            - internet-gateway
            - network
            - network-load-balancer
            - network-sku
            - nic
            - object-storage-account
            - public-ip
            - region
            - role
            - role-assignment
            - routing-table
            - security-group
            - security-group-rule
            - storage-sku
            - subnet
            - workspace
          x-enumNames:
            - ResourceKindActivityLog
            - ResourceKindBlockStorage
            - ResourceKindImage
            - ResourceKindInstance
            - ResourceKindInstanceSku
            - ResourceKindInternetGateway
            - ResourceKindNetwork
            - ResourceKindNetworkLoadBalancer
            - ResourceKindNetworkSku
            - ResourceKindNic
            - ResourceKindObjectStorageAccount
            - ResourceKindPublicIP
            - ResourceKindRegion
            - ResourceKindRole
            - ResourceKindRoleAssignment
            - ResourceKindRoutingTable
            - ResourceKindSecurityGroup
            - ResourceKindSecurityGroupRule
            - ResourceKindStorageSku
            - ResourceKindSubnet
            - ResourceKindWorkspace
        ref:
          $ref: '#/components/schemas/ReferenceURN'
    TenantMetadata:
      type: object
      description: Metadata for resources with tenant constraints
      readOnly: true
      required:
        - tenant
      properties:
        tenant:
          type: string
          description: Tenant identifier
          minLength: 1
          maxLength: 64
    WorkspaceMetadata:
      type: object
      description: Metadata for resources with workspace constraints
      readOnly: true
      required:
        - workspace
      properties:
        workspace:
          type: string
          description: Workspace identifier
          minLength: 1
          maxLength: 64
    RegionalMetadata:
      type: object
      description: Metadata for regional resources
      readOnly: true
      required:
        - region
      properties:
        region:
          type: string
          description: Reference to the region where the resource is located
          minLength: 1
          maxLength: 64
          example: eu-central-1
    RegionalWorkspaceResourceMetadata:
      description: |
        Metadata for regional resources with name, permission, modification, type, tenant and workspace and region information.
      allOf:
        - $ref: '#/components/schemas/NameMetadata'
        - $ref: '#/components/schemas/PermissionMetadata'
        - $ref: '#/components/schemas/ModificationMetadata'
        - $ref: '#/components/schemas/TypeMetadata'
        - $ref: '#/components/schemas/TenantMetadata'
        - $ref: '#/components/schemas/WorkspaceMetadata'
        - $ref: '#/components/schemas/RegionalMetadata'
    Reference:
      type: object
      description: |
        A reference to a resource using an object. The object contains the
        same information as the ReferenceURN, but is represented as a structured object.
        The advantage of this representation is that it can be used to reference
        resources in different workspaces or regions without the need to specify
        the full URN.
      required:
        - resource
      properties:
        region:
          type: string
          x-go-type-skip-optional-pointer: true
          description: |
            Region of the resource. If not set, the region is inferred from the context.
          maxLength: 64
          example: eu-central-1
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-max-length: '64'
        provider:
          type: string
          x-go-type-skip-optional-pointer: true
          description: |
            Provider of the resource. If not set, the provider is inferred from the context.
          maxLength: 64
          example: seca.compute/v1
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-max-length: '64'
        tenant:
          type: string
          x-go-type-skip-optional-pointer: true
          description: |
            Tenant of the resource. If not set, the tenant is inferred from the context.
          maxLength: 64
          example: tenant-1
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-max-length: '64'
        workspace:
          type: string
          x-go-type-skip-optional-pointer: true
          description: |
            Workspace of the resource. If not set, the workspace is inferred from the context.
          maxLength: 64
          example: workspace-1
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-max-length: '64'
        resource:
          type: string
          description: |
            Resource-specific path identifying the resource within its workspace context.
            This is the segment of the full URN after the provider, version, tenant, and
            workspace parts. For a flat resource it is `<type>/<name>`, and for hierarchical
            (nested) resources it includes the parent path segments:
              `networks/<network-name>/route-tables/<rt-name>`
            The provider, tenant, and workspace can be specified as separate fields in this
            object; they do not need to be repeated here.
          minLength: 1
          maxLength: 256
          example: instances/my-server
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-min-length: '1'
            x-kubebuilder-validation-max-length: '256'
    KubernetesClusterSpec:
      type: object
      description: |
        Specification of the  kubernetes cluster, including its configuration
        and network settings.

        Changing the sku of the cluster will cause the cluster to be recreated.
      required:
        - skuRef
      properties:
        skuRef:
          allOf:
            - $ref: '#/components/schemas/Reference'
          description: |
            Reference to the SKU of the Kubernetes cluster. The SKU is immutable after the cluster is created.
            To change the SKU, the cluster must be deleted and recreated with the new SKU reference.
          example:
            resource: tenants/seca/skus/xl
          x-oapi-codegen-extra-tags:
            x-cel-rule-0: self == oldSelf
            x-cel-message-0: spec.skuRef is immutable
        restrictKubernetesApi:
          description: |
            Restrict access to the Kubernetes API to specific IP addresses or ranges.
            This is a security feature to limit access to the cluster. If not specified,
            the Kubernetes API is accessible from any IP address. Nodes that are
            part of the cluster are always allowed to access the Kubernetes API.
          type: array
          x-go-type-skip-optional-pointer: true
          maxItems: 100
          items:
            type: string
            description: |
              IP address or CIDR range to restrict access to the Kubernetes API.
              The IP address or CIDR can be for IPv4 or IPv6.
            maxLength: 45
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-items-max-length: '45'
            x-kubebuilder-validation-max-items: '100'
          example:
            - 1.2.3.4/32
            - 2002::1234:abcd:ffff:c0a8:101/64
            - 1.2.3.4
            - 2002::1234:abcd:ffff:c0a8:101
        podCidr:
          type: string
          x-go-type-skip-optional-pointer: true
          description: |
            CIDR range for the pod network. This is used to allocate IP addresses
            for pods in the cluster. The CIDR must be a valid IPv4 or IPv6 CIDR.
            If not specified, a default provider CIDR will be used.
          example: 192.168.0.0/24
        serviceCidr:
          type: string
          x-go-type-skip-optional-pointer: true
          description: |
            CIDR range for the service network. This is used to allocate IP addresses
            for services in the cluster. The CIDR must be a valid IPv4 or IPv6 CIDR.
            If not specified, a default provider CIDR will be used.
          example: 100.64.0.0/18
    ResourceState:
      type: string
      description: |
        Current phase of the resource:
        - pending: not available, waiting for other resources
        - creating: not available, creation started
