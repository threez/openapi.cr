openapi: 3.0.3
info:
  title: Compute
  version: v1
  description: |
    The Compute Foundation API provides access to compute resources 
    including virtual machines and instance management.
    This API is part of the Sovereign European Cloud API.
servers:
  - url: https://demo.secapi.cloud/providers/seca.compute
    description: Path Schema
  - url: https://compute.seca.demo.secapi.cloud
    description: DNS Schema
security:
  - bearerAuth: []
tags:
  - name: Sku
    description: Sku management
  - name: Instance
    description: Instance management
paths:
  /v1/tenants/{tenant}/skus:
    get:
      tags:
        - Sku
      security:
        - bearerAuth: []
      summary: List skus
      description: |
        Retrieves a list of available SKU (Stock Keeping Unit) configurations for compute instances.

        ## Available SECA SKUs with their capabilities.
        Seca-Resources don"t have mandatory parameters and extensions.
        (Provider may have more SKUs available.)

        | Tier | vCPU | RAM | Architecture | benchmarkPoints |
        |-|-|-|-|-|
        | D2XS | 1 | 1 | amd64 | min 500 |
        | DXS | 1 | 2 | amd64 | min 750 |
        | DS | 2 | 4 | amd64 | min 2200 |
        | DM | 4 | 8 | amd64 | min 3500 |
        | DL | 8 | 16 | amd64 | min 6000 |
        | DXL | 16 | 32 | amd64 | min 9000 |
        | D2XL | 32 | 64 | amd64 | min 13000 |
        | S2XS | 1 | 1 | amd64 | min 500 |
        | SXS | 1 | 2 | amd64 | min 700 |
        | SS | 2 | 4 | amd64 | min 2000 |
        | SM | 4 | 8 | amd64 | min 3000 |
        | SL | 8 | 16 | amd64 | min 5500 |
        | SXL | 16 | 32 | amd64 | min 8000 |
        | S2XL | 32 | 64 | amd64 | min 9000 |
      operationId: listSkus
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/labelSelector'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/skipTokenParam'
        - $ref: '#/components/parameters/acceptHeader'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkuIterator'
              example:
                items:
                  - labels:
                      architecture: amd64
                      provider: seca
                      tier: D2XS
                    metadata:
                      apiVersion: v1
                      kind: instance-sku
                      name: seca.d2xs
                      provider: seca.compute/v1
                      ref: seca.compute/v1/tenants/tn-1/skus/seca.d2xs
                      region: eu-central-1
                      resource: tenants/tn-1/skus/seca.d2xs
                      tenant: ts-1
                      verb: get
                    spec:
                      ram: 1
                      vCPU: 1
                  - labels:
                      architecture: amd64
                      provider: seca
                      tier: DXS
                    metadata:
                      apiVersion: v1
                      kind: instance-sku
                      name: seca.dxs
                      provider: seca.compute/v1
                      ref: seca.compute/v1/tenants/tn-1/skus/seca.dxs
                      region: eu-central-1
                      resource: tenants/tn-1/skus/seca.dxs
                      tenant: ts-1
                      verb: get
                    spec:
                      ram: 2
                      vCPU: 1
                  - labels:
                      architecture: amd64
                      provider: seca
                      tier: DS
                    metadata:
                      apiVersion: v1
                      kind: instance-sku
                      name: seca.ds
                      provider: seca.compute/v1
                      ref: seca.compute/v1/tenants/tn-1/skus/seca.ds
                      region: eu-central-1
                      resource: tenants/tn-1/skus/seca.ds
                      tenant: ts-1
                      verb: get
                    spec:
                      ram: 4
                      vCPU: 2
                  - labels:
                      architecture: amd64
                      provider: seca
                      tier: DM
                    metadata:
                      apiVersion: v1
                      kind: instance-sku
                      name: seca.dm
                      provider: seca.compute/v1
                      ref: seca.compute/v1/tenants/tn-1/skus/seca.dm
                      region: eu-central-1
                      resource: tenants/tn-1/skus/seca.dm
                      tenant: ts-1
                      verb: get
                    spec:
                      ram: 8
                      vCPU: 4
                  - labels:
                      architecture: amd64
                      provider: seca
                      tier: DL
                    metadata:
                      apiVersion: v1
                      kind: instance-sku
                      name: seca.dl
                      provider: seca.compute/v1
                      ref: seca.compute/v1/tenants/tn-1/skus/seca.dl
                      region: eu-central-1
                      resource: tenants/tn-1/skus/seca.dl
                      tenant: ts-1
                      verb: get
                    spec:
                      ram: 16
                      vCPU: 8
                  - labels:
                      architecture: amd64
                      provider: seca
                      tier: DXL
                    metadata:
                      apiVersion: v1
                      kind: instance-sku
                      name: seca.dxl
                      provider: seca.compute/v1
                      ref: seca.compute/v1/tenants/tn-1/skus/seca.dxl
                      region: eu-central-1
                      resource: tenants/tn-1/skus/seca.dxl
                      tenant: ts-1
                      verb: get
                    spec:
                      ram: 32
                      vCPU: 16
                  - labels:
                      architecture: amd64
                      provider: seca
                      tier: D2XL
                    metadata:
                      apiVersion: v1
                      kind: instance-sku
                      name: seca.d2xl
                      provider: seca.compute/v1
                      ref: seca.compute/v1/tenants/tn-1/skus/seca.d2xl
                      region: eu-central-1
                      resource: tenants/tn-1/skus/seca.d2xl
                      tenant: ts-1
                      verb: get
                    spec:
                      ram: 64
                      vCPU: 32
                  - labels:
                      architecture: amd64
                      provider: seca
                      tier: S2XS
                    metadata:
                      apiVersion: v1
                      kind: instance-sku
                      name: seca.s2xs
                      provider: seca.compute/v1
                      ref: seca.compute/v1/tenants/tn-1/skus/seca.s2xs
                      region: eu-central-1
                      resource: tenants/tn-1/skus/seca.s2xs
                      tenant: ts-1
                      verb: get
                    spec:
                      ram: 1
                      vCPU: 1
                  - labels:
                      architecture: amd64
                      provider: seca
                      tier: SXS
                    metadata:
                      apiVersion: v1
                      kind: instance-sku
                      name: seca.sxs
                      provider: seca.compute/v1
                      ref: seca.compute/v1/tenants/tn-1/skus/seca.sxs
                      region: eu-central-1
                      resource: tenants/tn-1/skus/seca.sxs
                      tenant: ts-1
                      verb: get
                    spec:
                      ram: 2
                      vCPU: 1
                  - labels:
                      architecture: amd64
                      provider: seca
                      tier: SS
                    metadata:
                      apiVersion: v1
                      kind: instance-sku
                      name: seca.ss
                      provider: seca.compute/v1
                      ref: seca.compute/v1/tenants/tn-1/skus/seca.ss
                      region: eu-central-1
                      resource: tenants/tn-1/skus/seca.ss
                      tenant: ts-1
                      verb: get
                    spec:
                      ram: 4
                      vCPU: 2
                  - labels:
                      architecture: amd64
                      provider: seca
                      tier: SM
                    metadata:
                      apiVersion: v1
                      kind: instance-sku
                      name: seca.sm
                      provider: seca.compute/v1
                      ref: seca.compute/v1/tenants/tn-1/skus/seca.sm
                      region: eu-central-1
                      resource: tenants/tn-1/skus/seca.sm
                      tenant: ts-1
                      verb: get
                    spec:
                      ram: 8
                      vCPU: 4
                  - labels:
                      architecture: amd64
                      provider: seca
                      tier: SL
                    metadata:
                      apiVersion: v1
                      kind: instance-sku
                      name: seca.sl
                      provider: seca.compute/v1
                      ref: seca.compute/v1/tenants/tn-1/skus/seca.sl
                      region: eu-central-1
                      resource: tenants/tn-1/skus/seca.sl
                      tenant: ts-1
                      verb: get
                    spec:
                      ram: 16
                      vCPU: 8
                  - labels:
                      architecture: amd64
                      provider: seca
                      tier: SXL
                    metadata:
                      apiVersion: v1
                      kind: instance-sku
                      name: seca.sxl
                      provider: seca.compute/v1
                      ref: seca.compute/v1/tenants/tn-1/skus/seca.sxl
                      region: eu-central-1
                      resource: tenants/tn-1/skus/seca.sxl
                      tenant: ts-1
                      verb: get
                    spec:
                      ram: 32
                      vCPU: 16
                  - labels:
                      architecture: amd64
                      provider: seca
                      tier: S2XL
                    metadata:
                      apiVersion: v1
                      kind: instance-sku
                      name: seca.s2xl
                      provider: seca.compute/v1
                      ref: seca.compute/v1/tenants/tn-1/skus/seca.s2xl
                      region: eu-central-1
                      resource: tenants/tn-1/skus/seca.s2xl
                      tenant: ts-1
                      verb: get
                    spec:
                      ram: 64
                      vCPU: 32
                metadata:
                  provider: seca.compute/v1
                  resource: tenants/1/skus
                  verb: list
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '500':
          $ref: '#/components/responses/Error500'
  /v1/tenants/{tenant}/skus/{name}:
    get:
      tags:
        - Sku
      security:
        - bearerAuth: []
      summary: Get sku
      description: |
        Get a specific sku, useful for polling status updates of resources.
        A `404` response without proper schema has to be ignored and must be
        understood as server being unavailable. Only a response with proper schema
        can be trusted.
      operationId: getSku
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/resourcePathParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstanceSku'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'
  /v1/tenants/{tenant}/workspaces/{workspace}/instances:
    get:
      tags:
        - Instance
      security:
        - bearerAuth: []
      summary: List instances
      description: |
        Lists instances and provides paginated, filtered access.
      operationId: listInstances
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/workspacePathParam'
        - $ref: '#/components/parameters/labelSelector'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/skipTokenParam'
        - $ref: '#/components/parameters/acceptHeader'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstanceIterator'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '500':
          $ref: '#/components/responses/Error500'
  /v1/tenants/{tenant}/workspaces/{workspace}/instances/{name}:
    get:
      tags:
        - Instance
      security:
        - bearerAuth: []
      summary: Get instance
      description: |
        Get a specific instance, useful for polling status updates of resources.
        A `404` response without proper schema has to be ignored and must be
        understood as server being unavailable. Only a response with proper schema
        can be trusted.
      operationId: getInstance
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/workspacePathParam'
        - $ref: '#/components/parameters/resourcePathParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Instance'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'
    put:
      tags:
        - Instance
      security:
        - bearerAuth: []
      summary: Create or update instance
      description: |
        Creates or updates a instance. The return code of the endpoint
        provides indicates if the resource was created or updated. A client
        must accept both as successful response to the request.
      operationId: createOrUpdateInstance
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/workspacePathParam'
        - $ref: '#/components/parameters/resourcePathParam'
        - $ref: '#/components/parameters/ifUnmodifiedSince'
      requestBody:
        description: |
          Any provided `metadata` on the instance will be ignored by the resource server.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Instance'
      responses:
        '200':
          description: |
            Instance successfully updated, doesn't indicate successful
            resource provisioning.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Instance'
        '201':
          description: |
            Instance successfully created, doesn't indicate successful
            resource provisioning.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Instance'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'
        '412':
          $ref: '#/components/responses/Error412'
        '422':
          $ref: '#/components/responses/Error422'
        '500':
          $ref: '#/components/responses/Error500'
    delete:
      tags:
        - Instance
      security:
        - bearerAuth: []
      summary: Delete instance
      description: |
        Deletes a instance using the given name. In case the resource workspace
        already deleted `404` is returned. For failure tolerance in case of retry the
        client needs to accept `404` and `202` as a successful deletion. In case the
        client tries to delete a resource for the first time and gets a `404`, the
        resource might not exist for other reasons or never existed in the first 
        place. This can't be assumed as a safe deletion of the resource. 
        If deletion of the resource takes longer deletion can be 
        issued multiple times with the same result `202`, in all cased the resource
        will be only deleted once. A client must verify the client response to contain
        a proper error schema. A `404` response without proper schema has to be ignored
        and understood as server unavailable error.
      operationId: deleteInstance
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/workspacePathParam'
        - $ref: '#/components/parameters/resourcePathParam'
        - $ref: '#/components/parameters/ifUnmodifiedSince'
      responses:
        '202':
          description: Instance deletion accepted
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'
        '412':
          $ref: '#/components/responses/Error412'
        '500':
          $ref: '#/components/responses/Error500'
  /v1/tenants/{tenant}/workspaces/{workspace}/instances/{name}/start:
    post:
      tags:
        - Instance
      security:
        - bearerAuth: []
      summary: start instance
      description: |
        Power on (boot) a specific instance
      operationId: StartInstance
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/workspacePathParam'
        - $ref: '#/components/parameters/resourcePathParam'
        - $ref: '#/components/parameters/ifUnmodifiedSince'
      responses:
        '202':
          description: action accepted
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'
        '500':
          $ref: '#/components/responses/Error500'
  /v1/tenants/{tenant}/workspaces/{workspace}/instances/{name}/stop:
    post:
      tags:
        - Instance
      security:
        - bearerAuth: []
      summary: stop instance
      description: |
        Power off (shutdown) a specific instance
      operationId: StopInstance
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/workspacePathParam'
        - $ref: '#/components/parameters/resourcePathParam'
        - $ref: '#/components/parameters/ifUnmodifiedSince'
      responses:
        '202':
          description: action accepted
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'
        '500':
          $ref: '#/components/responses/Error500'
  /v1/tenants/{tenant}/workspaces/{workspace}/instances/{name}/restart:
    post:
      tags:
        - Instance
      security:
        - bearerAuth: []
      summary: restart instance
      description: |
        Power cycle (reboot) a specific instance
      operationId: RestartInstance
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/workspacePathParam'
        - $ref: '#/components/parameters/resourcePathParam'
        - $ref: '#/components/parameters/ifUnmodifiedSince'
      responses:
        '202':
          description: action accepted
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'
        '500':
          $ref: '#/components/responses/Error500'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Use a JWT token for authentication. The token identifies the user,
        and policies (RBAC, ABAC, or hybrid) determine authorization.
  schemas:
    SkuIterator:
      description: Iterator for skus
      type: object
      required:
        - items
        - metadata
      properties:
        items:
          description: List of skus
          type: array
          items:
            $ref: '#/components/schemas/InstanceSku'
        metadata:
          $ref: '#/components/schemas/ResponseMetadata'
    InstanceIterator:
      description: Iterator for instances
      type: object
      required:
        - items
        - metadata
      properties:
        items:
          description: List of instances
          type: array
          items:
            $ref: '#/components/schemas/Instance'
        metadata:
          $ref: '#/components/schemas/ResponseMetadata'
    Labels:
      x-go-type-skip-optional-pointer: true
      type: object
      description: |
        User-defined key/value pairs that are mutable and can be used to
        organize and categorize resources. They can be used to filter resources.
        The number of labels is eventually limited by the CSP.
      additionalProperties:
        type: string
        maxLength: 63
      example:
        env: production
    Annotations:
      x-go-type-skip-optional-pointer: true
      type: object
      description: |
        User-defined key/value pairs that are mutable and can be used to add annotations.
        The number of annotations is eventually limited by the CSP.
      additionalProperties:
        type: string
        maxLength: 1024
      example:
        description: Human readable description
    Extensions:
      x-go-type-skip-optional-pointer: true
      type: object
      description: |
        User-defined key/value pairs that are mutable and can be used to add extensions.
        Extensions are subject to validation by the CSP, and any value that is not accepted will be rejected during admission.
      additionalProperties:
        type: string
    SystemResourceMetadata:
      type: object
      description: Metadata for user-defined resource properties
      properties:
        labels:
          $ref: '#/components/schemas/Labels'
        annotations:
          $ref: '#/components/schemas/Annotations'
        extensions:
          $ref: '#/components/schemas/Extensions'
    NameMetadata:
      type: object
      readOnly: true
      required:
        - name
      description: Metadata for resource names
      properties:
        name:
          type: string
          description: |
            Resource identifier in dash-case (kebab-case) format. Must start and end with an alphanumeric character.
            Can contain lowercase letters, numbers, and hyphens. Multiple segments can be joined with dots.
            Each segment follows the same rules.
          minLength: 1
          maxLength: 128
          pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
          example: resource-name
    PermissionMetadata:
      type: object
      readOnly: true
      description: Metadata for permission management
      required:
        - provider
        - resource
        - verb
      properties:
        provider:
          type: string
          minLength: 1
          maxLength: 64
          example: seca.compute/v1
        resource:
          type: string
          minLength: 1
          maxLength: 256
          example: tenants/tn-1/workspaces/ws-1/instances/my-server
        verb:
          type: string
          minLength: 1
          maxLength: 7
          example: get
      example:
        provider: seca.compute/v1
        resource: tenants/tn-1/workspaces/ws-1/instances/my-server
        verb: get
    ReferenceURN:
      type: string
      minLength: 1
      description: |
        A unique resource name (URN) used to identify and reference this resource.

        The URN is NOT a URL — it does not contain a protocol scheme (http/https), a host,
        or any endpoint-specific prefix. It is a portable, transport-agnostic identifier.
        A configured SDK client — which knows the provider's base URL and endpoint mapping —
        can derive a URL from a URN, but the URN alone cannot be turned into a URL without
        that SDK configuration context. This separation keeps the URN portable across
        environments and CSP deployments.

        The full URN format is:
          `{provider}/{version}/tenants/{tenant}/workspaces/{workspace}/{type}/{name}`

        For hierarchical (nested) resources, additional parent path segments are included:
          `seca.network/v1/tenants/tn-1/workspaces/ws-1/networks/my-net/route-tables/my-rt`

        ### Automatic Prefix Inference

        In most cases, the prefix of the URN can be automatically derived in the given context.
        To simplify usage, only the resource type and name might be specified as a reference
        using the `<type>/<name>` notation. The suffix can be made more specific by adding
        additional segments separated by slashes.

        The prefix is automatically inferred from the context. For example, if the resource is a
        block storage in the same workspace the reference can be specified as
        `block-storages/my-block-storage`. If the resource is a block storage in a different workspace, the
        reference can be specified as `workspaces/ws-1/block-storages/my-block-storage`.

        For automatic prefix inference, the following rules apply:
        - the version is inferred from the current resource version
        - the workspace is inferred from the current workspace
        - the region is inferred from the current region
        - the provider is inferred from the type and context of the usage

        The prefix inference is resolved on admission into the full URN format, which makes it
        mostly suitable for human use.
      maxLength: 255
      example: seca.compute/v1/tenants/tn-1/workspaces/ws-1/instances/my-server
    TypeMetadata:
      type: object
      readOnly: true
      required:
        - apiVersion
        - kind
        - ref
      description: |
        Metadata for all resources with type information.
      properties:
        apiVersion:
          type: string
          description: API version of the resource
          minLength: 1
          maxLength: 16
          default: v1
        kind:
          type: string
          description: Type of the resource
          enum:
            - activity-log
            - block-storage
            - image
            - instance
            - instance-sku
            - internet-gateway
            - network
            - network-load-balancer
            - network-sku
            - nic
            - object-storage-account
            - public-ip
            - region
            - role
            - role-assignment
            - routing-table
            - security-group
            - security-group-rule
            - storage-sku
            - subnet
            - workspace
          x-enumNames:
            - ResourceKindActivityLog
            - ResourceKindBlockStorage
            - ResourceKindImage
            - ResourceKindInstance
            - ResourceKindInstanceSku
            - ResourceKindInternetGateway
            - ResourceKindNetwork
            - ResourceKindNetworkLoadBalancer
            - ResourceKindNetworkSku
