openapi: 3.0.3
info:
  title: Storage
  version: v1
  description: |
    The Storage Foundation API provides access to storage resources including 
    block storage and images.
    This API is part of the Sovereign European Cloud API.
servers:
  - url: https://demo.secapi.cloud/providers/seca.storage
    description: Path Schema
  - url: https://storage.seca.demo.secapi.cloud
    description: DNS Schema
security:
  - bearerAuth: []
tags:
  - name: Sku
    description: Sku management
  - name: Image
    description: Image management
  - name: Block-Storage
    description: Block-Storage management
paths:
  /v1/tenants/{tenant}/skus:
    get:
      tags:
        - Sku
      security:
        - bearerAuth: []
      summary: List skus
      description: |
        Retrieves a list of available SKU (Stock Keeping Unit) configurations for block storage resources.

        ## Available SECA Block Storage SKUs with their capabilities

        Block Storage SKUs represent guaranteed IOPS performance for 99% of time within a 24h period.
        Minimum volume size for guaranteed performance is provider specific. Not all SKUs are available in 
        all regions and all CSP. Provides can provide additional SKUs with different performance 
        characteristics.

        | Tier | IOPS | Type |
        |-|-|-|
        | RD100 | 100     | remote-durable  |
        | RD500 | 500     | remote-durable  |
        | RD2K  | 2.0     | remote-durable  |
        | RD10K | 10.000  | remote-durable  |
        | RD20K | 20.000  | remote-durable  |
        | LD100 | 100     | local-durable   |
        | LD500 | 500     | local-durable   |
        | LD5K  | 5.0     | local-durable   |
        | LD20K | 20.000  | local-durable   |
        | LD40K | 40.000  | local-durable   |
        | LE100 | 100     | local-ephemeral |
        | LE500 | 500     | local-ephemeral |
        | LE5K  | 5.0     | local-ephemeral |
        | LE20K | 20.000  | local-ephemeral |
        | LE40K | 40.000  | local-ephemeral |
      operationId: listSkus
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/labelSelector'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/skipTokenParam'
        - $ref: '#/components/parameters/acceptHeader'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkuIterator'
              example:
                items:
                  - labels:
                      provider: seca
                      tier: RD100
                    metadata:
                      apiVersion: v1
                      kind: storage-sku
                      name: seca.rd100
                      provider: seca.storage/v1
                      ref: seca.storage/v1/tenants/tn-1/skus/seca.rd100
                      region: eu-central-1
                      resource: tenants/tn-1/skus/seca.rd100
                      tenant: ts-1
                      verb: get
                    spec:
                      iops: 100
                      minVolumeSize: 50
                      type: remote-durable
                  - labels:
                      provider: seca
                      tier: RD500
                    metadata:
                      apiVersion: v1
                      kind: storage-sku
                      name: seca.rd500
                      provider: seca.storage/v1
                      ref: seca.storage/v1/tenants/tn-1/skus/seca.rd500
                      region: eu-central-1
                      resource: tenants/tn-1/skus/seca.rd500
                      tenant: ts-1
                      verb: get
                    spec:
                      iops: 500
                      minVolumeSize: 50
                      type: remote-durable
                  - labels:
                      provider: seca
                      tier: RD2K
                    metadata:
                      apiVersion: v1
                      kind: storage-sku
                      name: seca.rd2k
                      provider: seca.storage/v1
                      ref: seca.storage/v1/tenants/tn-1/skus/seca.rd2k
                      region: eu-central-1
                      resource: tenants/tn-1/skus/seca.rd2k
                      tenant: ts-1
                      verb: get
                    spec:
                      iops: 2000
                      minVolumeSize: 50
                      type: remote-durable
                  - labels:
                      provider: seca
                      tier: RD10K
                    metadata:
                      apiVersion: v1
                      kind: storage-sku
                      name: seca.rd10k
                      provider: seca.storage/v1
                      ref: seca.storage/v1/tenants/tn-1/skus/seca.rd10k
                      region: eu-central-1
                      resource: tenants/tn-1/skus/seca.rd10k
                      tenant: ts-1
                      verb: get
                    spec:
                      iops: 10000
                      minVolumeSize: 50
                      type: remote-durable
                  - labels:
                      provider: seca
                      tier: RD20K
                    metadata:
                      apiVersion: v1
                      kind: storage-sku
                      name: seca.rd20k
                      provider: seca.storage/v1
                      ref: seca.storage/v1/tenants/tn-1/skus/seca.rd20k
                      region: eu-central-1
                      resource: tenants/tn-1/skus/seca.rd20k
                      tenant: ts-1
                      verb: get
                    spec:
                      iops: 20000
                      minVolumeSize: 50
                      type: remote-durable
                  - labels:
                      provider: seca
                      tier: LD100
                    metadata:
                      apiVersion: v1
                      kind: storage-sku
                      name: seca.ld100
                      provider: seca.storage/v1
                      ref: seca.storage/v1/tenants/tn-1/skus/seca.ld100
                      region: eu-central-1
                      resource: tenants/tn-1/skus/seca.ld100
                      tenant: ts-1
                      verb: get
                    spec:
                      iops: 100
                      minVolumeSize: 50
                      type: local-durable
                  - labels:
                      provider: seca
                      tier: LD500
                    metadata:
                      apiVersion: v1
                      kind: storage-sku
                      name: seca.ld500
                      provider: seca.storage/v1
                      ref: seca.storage/v1/tenants/tn-1/skus/seca.ld500
                      region: eu-central-1
                      resource: tenants/tn-1/skus/seca.ld500
                      tenant: ts-1
                      verb: get
                    spec:
                      iops: 500
                      minVolumeSize: 50
                      type: local-durable
                  - labels:
                      provider: seca
                      tier: LD5K
                    metadata:
                      apiVersion: v1
                      kind: storage-sku
                      name: seca.ld5k
                      provider: seca.storage/v1
                      ref: seca.storage/v1/tenants/tn-1/skus/seca.ld5k
                      region: eu-central-1
                      resource: tenants/tn-1/skus/seca.ld5k
                      tenant: ts-1
                      verb: get
                    spec:
                      iops: 5000
                      minVolumeSize: 50
                      type: local-durable
                  - labels:
                      provider: seca
                      tier: LD20K
                    metadata:
                      apiVersion: v1
                      kind: storage-sku
                      name: seca.ld20k
                      provider: seca.storage/v1
                      ref: seca.storage/v1/tenants/tn-1/skus/seca.ld20k
                      region: eu-central-1
                      resource: tenants/tn-1/skus/seca.ld20k
                      tenant: ts-1
                      verb: get
                    spec:
                      iops: 20000
                      minVolumeSize: 50
                      type: local-durable
                  - labels:
                      provider: seca
                      tier: LE100
                    metadata:
                      apiVersion: v1
                      kind: storage-sku
                      name: seca.le100
                      provider: seca.storage/v1
                      ref: seca.storage/v1/tenants/tn-1/skus/seca.le100
                      region: eu-central-1
                      resource: tenants/tn-1/skus/seca.le100
                      tenant: ts-1
                      verb: get
                    spec:
                      iops: 100
                      minVolumeSize: 50
                      type: local-ephemeral
                  - labels:
                      provider: seca
                      tier: LE500
                    metadata:
                      apiVersion: v1
                      kind: storage-sku
                      name: seca.le500
                      provider: seca.storage/v1
                      ref: seca.storage/v1/tenants/tn-1/skus/seca.le500
                      region: eu-central-1
                      resource: tenants/tn-1/skus/seca.le500
                      tenant: ts-1
                      verb: get
                    spec:
                      iops: 500
                      minVolumeSize: 50
                      type: local-ephemeral
                  - labels:
                      provider: seca
                      tier: LE5K
                    metadata:
                      apiVersion: v1
                      kind: storage-sku
                      name: seca.le5k
                      provider: seca.storage/v1
                      ref: seca.storage/v1/tenants/tn-1/skus/seca.le5k
                      region: eu-central-1
                      resource: tenants/tn-1/skus/seca.le5k
                      tenant: ts-1
                      verb: get
                    spec:
                      iops: 5000
                      minVolumeSize: 50
                      type: local-ephemeral
                  - labels:
                      provider: seca
                      tier: LE20K
                    metadata:
                      apiVersion: v1
                      kind: storage-sku
                      name: seca.le20k
                      provider: seca.storage/v1
                      ref: seca.storage/v1/tenants/tn-1/skus/seca.le20k
                      region: eu-central-1
                      resource: tenants/tn-1/skus/seca.le20k
                      tenant: ts-1
                      verb: get
                    spec:
                      iops: 20000
                      minVolumeSize: 50
                      type: local-ephemeral
                  - labels:
                      provider: seca
                      tier: LE40K
                    metadata:
                      apiVersion: v1
                      kind: storage-sku
                      name: seca.le40k
                      provider: seca.storage/v1
                      ref: seca.storage/v1/tenants/tn-1/skus/seca.le40k
                      region: eu-central-1
                      resource: tenants/tn-1/skus/seca.le40k
                      tenant: ts-1
                      verb: get
                    spec:
                      iops: 40000
                      minVolumeSize: 50
                      type: local-ephemeral
                metadata:
                  provider: seca.compute/v1
                  resource: tenants/1/skus
                  skipToken: 'false'
                  verb: list
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '500':
          $ref: '#/components/responses/Error500'
  /v1/tenants/{tenant}/skus/{name}:
    get:
      tags:
        - Sku
      security:
        - bearerAuth: []
      summary: Get sku
      description: |
        Get a specific sku, useful for polling status updates of resources.
        A `404` response without proper schema has to be ignored and must be
        understood as server being unavailable. Only a response with proper schema
        can be trusted.
      operationId: getSku
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/resourcePathParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorageSku'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'
  /v1/tenants/{tenant}/images:
    get:
      tags:
        - Image
      security:
        - bearerAuth: []
      summary: List images
      description: |
        Lists images and provides paginated, filtered access.
      operationId: listImages
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/labelSelector'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/skipTokenParam'
        - $ref: '#/components/parameters/acceptHeader'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageIterator'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '500':
          $ref: '#/components/responses/Error500'
  /v1/tenants/{tenant}/images/{name}:
    get:
      tags:
        - Image
      security:
        - bearerAuth: []
      summary: Get image
      description: |
        Get a specific image, useful for polling status updates of resources.
        A `404` response without proper schema has to be ignored and must be
        understood as server being unavailable. Only a response with proper schema
        can be trusted.
      operationId: getImage
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/resourcePathParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'
    put:
      tags:
        - Image
      security:
        - bearerAuth: []
      summary: Create or update image
      description: |
        Creates or updates a image. The return code of the endpoint provides indicates if the resource was created or updated. A client must accept both as successful response to the request. Please check the [Image Handling](/docs/content/Other/image-handling) section before creating images.
      operationId: createOrUpdateImage
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/resourcePathParam'
        - $ref: '#/components/parameters/ifUnmodifiedSince'
      requestBody:
        description: |
          Any provided `metadata` on the image will be ignored by the resource server.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Image'
      responses:
        '200':
          description: |
            Image successfully updated, doesn't indicate successful
            resource provisioning.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
        '201':
          description: |
            Image successfully created, doesn't indicate successful
            resource provisioning.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'
        '412':
          $ref: '#/components/responses/Error412'
        '422':
          $ref: '#/components/responses/Error422'
        '500':
          $ref: '#/components/responses/Error500'
    delete:
      tags:
        - Image
      security:
        - bearerAuth: []
      summary: Delete image
      description: |
        Deletes a image using the given name. In case the resource workspace
        already deleted `404` is returned. For failure tolerance in case of retry the
        client needs to accept `404` and `202` as a successful deletion. In case the
        client tries to delete a resource for the first time and gets a `404`, the
        resource might not exist for other reasons or never existed in the first 
        place. This can't be assumed as a safe deletion of the resource. 
        If deletion of the resource takes longer deletion can be 
        issued multiple times with the same result `202`, in all cased the resource
        will be only deleted once. A client must verify the client response to contain
        a proper error schema. A `404` response without proper schema has to be ignored
        and understood as server unavailable error.
      operationId: deleteImage
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/resourcePathParam'
        - $ref: '#/components/parameters/ifUnmodifiedSince'
      responses:
        '202':
          description: Image deletion accepted
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'
        '412':
          $ref: '#/components/responses/Error412'
        '500':
          $ref: '#/components/responses/Error500'
  /v1/tenants/{tenant}/workspaces/{workspace}/block-storages:
    get:
      tags:
        - Block-Storage
      security:
        - bearerAuth: []
      summary: List block-storages
      description: |
        Lists block-storages and provides paginated, filtered access.
      operationId: listBlock-Storages
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/workspacePathParam'
        - $ref: '#/components/parameters/labelSelector'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/skipTokenParam'
        - $ref: '#/components/parameters/acceptHeader'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Block-StorageIterator'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '500':
          $ref: '#/components/responses/Error500'
  /v1/tenants/{tenant}/workspaces/{workspace}/block-storages/{name}:
    get:
      tags:
        - Block-Storage
      security:
        - bearerAuth: []
      summary: Get block-storage
      description: |
        Get a specific block-storage, useful for polling status updates of resources.
        A `404` response without proper schema has to be ignored and must be
        understood as server being unavailable. Only a response with proper schema
        can be trusted.
      operationId: getBlock-Storage
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/workspacePathParam'
        - $ref: '#/components/parameters/resourcePathParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockStorage'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'
    put:
      tags:
        - Block-Storage
      security:
        - bearerAuth: []
      summary: Create or update block-storage
      description: |
        Creates or updates a block-storage. The return code of the endpoint
        provides indicates if the resource was created or updated. A client
        must accept both as successful response to the request.
      operationId: createOrUpdateBlock-Storage
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/workspacePathParam'
        - $ref: '#/components/parameters/resourcePathParam'
        - $ref: '#/components/parameters/ifUnmodifiedSince'
      requestBody:
        description: |
          Any provided `metadata` on the block-storage will be ignored by the resource server.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlockStorage'
      responses:
        '200':
          description: |
            Block-Storage successfully updated, doesn't indicate successful
            resource provisioning.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockStorage'
        '201':
          description: |
            Block-Storage successfully created, doesn't indicate successful
            resource provisioning.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockStorage'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'
        '412':
          $ref: '#/components/responses/Error412'
        '422':
          $ref: '#/components/responses/Error422'
        '500':
          $ref: '#/components/responses/Error500'
    delete:
      tags:
        - Block-Storage
      security:
        - bearerAuth: []
      summary: Delete block-storage
      description: |
        Deletes a block-storage using the given name. In case the resource workspace
        already deleted `404` is returned. For failure tolerance in case of retry the
        client needs to accept `404` and `202` as a successful deletion. In case the
        client tries to delete a resource for the first time and gets a `404`, the
        resource might not exist for other reasons or never existed in the first 
        place. This can't be assumed as a safe deletion of the resource. 
        If deletion of the resource takes longer deletion can be 
        issued multiple times with the same result `202`, in all cased the resource
        will be only deleted once. A client must verify the client response to contain
        a proper error schema. A `404` response without proper schema has to be ignored
        and understood as server unavailable error.
      operationId: deleteBlock-Storage
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/workspacePathParam'
        - $ref: '#/components/parameters/resourcePathParam'
        - $ref: '#/components/parameters/ifUnmodifiedSince'
      responses:
        '202':
          description: Block-Storage deletion accepted
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'
        '412':
          $ref: '#/components/responses/Error412'
        '500':
          $ref: '#/components/responses/Error500'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Use a JWT token for authentication. The token identifies the user,
        and policies (RBAC, ABAC, or hybrid) determine authorization.
  schemas:
    SkuIterator:
      description: Iterator for skus
      type: object
      required:
        - items
        - metadata
      properties:
        items:
          description: List of skus
          type: array
          items:
            $ref: '#/components/schemas/StorageSku'
        metadata:
          $ref: '#/components/schemas/ResponseMetadata'
    ImageIterator:
      description: Iterator for images
      type: object
      required:
        - items
        - metadata
      properties:
        items:
          description: List of images
          type: array
          items:
            $ref: '#/components/schemas/Image'
        metadata:
          $ref: '#/components/schemas/ResponseMetadata'
    Block-StorageIterator:
      description: Iterator for block-storages
      type: object
      required:
        - items
        - metadata
      properties:
        items:
          description: List of block-storages
          type: array
          items:
            $ref: '#/components/schemas/BlockStorage'
        metadata:
          $ref: '#/components/schemas/ResponseMetadata'
    Labels:
      x-go-type-skip-optional-pointer: true
      type: object
      description: |
        User-defined key/value pairs that are mutable and can be used to
        organize and categorize resources. They can be used to filter resources.
        The number of labels is eventually limited by the CSP.
      additionalProperties:
        type: string
        maxLength: 63
      example:
        env: production
    Annotations:
      x-go-type-skip-optional-pointer: true
      type: object
      description: |
        User-defined key/value pairs that are mutable and can be used to add annotations.
        The number of annotations is eventually limited by the CSP.
      additionalProperties:
        type: string
        maxLength: 1024
      example:
        description: Human readable description
    Extensions:
      x-go-type-skip-optional-pointer: true
      type: object
      description: |
        User-defined key/value pairs that are mutable and can be used to add extensions.
        Extensions are subject to validation by the CSP, and any value that is not accepted will be rejected during admission.
      additionalProperties:
        type: string
    SystemResourceMetadata:
      type: object
      description: Metadata for user-defined resource properties
      properties:
        labels:
          $ref: '#/components/schemas/Labels'
        annotations:
          $ref: '#/components/schemas/Annotations'
        extensions:
          $ref: '#/components/schemas/Extensions'
    NameMetadata:
      type: object
      readOnly: true
      required:
        - name
      description: Metadata for resource names
      properties:
        name:
          type: string
          description: |
            Resource identifier in dash-case (kebab-case) format. Must start and end with an alphanumeric character.
            Can contain lowercase letters, numbers, and hyphens. Multiple segments can be joined with dots.
            Each segment follows the same rules.
          minLength: 1
          maxLength: 128
          pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
          example: resource-name
    PermissionMetadata:
      type: object
      readOnly: true
      description: Metadata for permission management
      required:
        - provider
        - resource
        - verb
      properties:
        provider:
          type: string
          minLength: 1
          maxLength: 64
          example: seca.compute/v1
        resource:
          type: string
          minLength: 1
          maxLength: 256
