openapi: 3.0.3
info:
  title: Authorization
  version: v1
  description: |
    The Authorization API provides access to authorization resources
    that are shared across all tenants and workspaces in all regions.
    This API is part of the Sovereign European Cloud API.
servers:
  - url: https://demo.secapi.cloud/providers/seca.authorization
    description: Path Schema
  - url: https://authorization.seca.demo.secapi.cloud
    description: DNS Schema
security:
  - bearerAuth: []
tags:
  - name: Role
    description: Role management
  - name: Role Assignment
    description: Role Assignment management
paths:
  /v1/tenants/{tenant}/roles:
    get:
      tags:
        - Role
      security:
        - bearerAuth: []
      summary: List roles
      description: |
        Lists roles and provides paginated, filtered access.
      operationId: listRoles
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/labelSelector'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/skipTokenParam'
        - $ref: '#/components/parameters/acceptHeader'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleIterator'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '500':
          $ref: '#/components/responses/Error500'
  /v1/tenants/{tenant}/roles/{name}:
    get:
      tags:
        - Role
      security:
        - bearerAuth: []
      summary: Get role
      description: |
        Get a specific role, useful for polling status updates of resources.
        A `404` response without proper schema has to be ignored and must be
        understood as server being unavailable. Only a response with proper schema
        can be trusted.
      operationId: getRole
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/resourcePathParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'
    put:
      tags:
        - Role
      security:
        - bearerAuth: []
      summary: Create or update role
      description: |
        System roles (seca.admin, seca.region-admin, seca.workspace-admin, seca.workspace-editor, seca.workspace-viewer) cannot be modified.

        Predefined system roles that cannot be modified:
        * `seca.admin` - Full system access, can manage everything
        * `seca.region-admin` - Full system access, can manage everything but authorization
        * `seca.workspace-admin` - Full access within a workspace
        * `seca.workspace-editor` - Can edit all resources in a workspace
        * `seca.workspace-viewer` - Can view all resources in a workspace
      operationId: createOrUpdateRole
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/resourcePathParam'
        - $ref: '#/components/parameters/ifUnmodifiedSince'
      requestBody:
        description: |
          Any provided `metadata` on the role will be ignored by the resource server.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Role'
      responses:
        '200':
          description: |
            Role successfully updated, doesn't indicate successful
            resource provisioning.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
        '201':
          description: |
            Role successfully created, doesn't indicate successful
            resource provisioning.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'
        '412':
          $ref: '#/components/responses/Error412'
        '422':
          $ref: '#/components/responses/Error422'
        '500':
          $ref: '#/components/responses/Error500'
    delete:
      tags:
        - Role
      security:
        - bearerAuth: []
      summary: Delete role
      description: |
        Deletes the specified role. When a role is deleted:
        * The role is removed from all role assignments
        * Role assignments are NOT deleted, even if the role array becomes empty
        * System roles (seca.admin, seca.region-admin, seca.workspace-admin, seca.workspace-editor, seca.workspace-viewer) cannot be deleted
      operationId: deleteRole
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/resourcePathParam'
        - $ref: '#/components/parameters/ifUnmodifiedSince'
      responses:
        '202':
          description: Role deletion accepted
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'
        '412':
          $ref: '#/components/responses/Error412'
        '500':
          $ref: '#/components/responses/Error500'
  /v1/tenants/{tenant}/role-assignments:
    get:
      tags:
        - Role Assignment
      security:
        - bearerAuth: []
      summary: List role assignments
      description: |
        Lists role assignments and provides paginated, filtered access.
      operationId: listRoleAssignments
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/labelSelector'
        - $ref: '#/components/parameters/limitParam'
        - $ref: '#/components/parameters/skipTokenParam'
        - $ref: '#/components/parameters/acceptHeader'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleAssignmentIterator'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '500':
          $ref: '#/components/responses/Error500'
  /v1/tenants/{tenant}/role-assignments/{name}:
    get:
      tags:
        - Role Assignment
      security:
        - bearerAuth: []
      summary: Get role assignment
      description: |
        Retrieves the details of a specific role assignment group by its name
      operationId: getRoleAssignment
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/resourcePathParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleAssignment'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'
    put:
      tags:
        - Role Assignment
      security:
        - bearerAuth: []
      summary: Create or update role assignment
      description: |
        Replaces all role assignments for the specified group within the workspace.
        At least one role must be assigned.
        Note: Role assignments can be created with an empty role array,
        which effectively removes all roles from the group while maintaining
        the role assignment record.
      operationId: createOrUpdateRoleAssignment
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/resourcePathParam'
        - $ref: '#/components/parameters/ifUnmodifiedSince'
      requestBody:
        description: |
          Any provided `metadata` on the role assignment will be ignored by the resource server.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleAssignment'
      responses:
        '200':
          description: |
            Role Assignment successfully updated, doesn't indicate successful
            resource provisioning.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleAssignment'
        '201':
          description: |
            Role Assignment successfully created, doesn't indicate successful
            resource provisioning.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleAssignment'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'
        '412':
          $ref: '#/components/responses/Error412'
        '422':
          $ref: '#/components/responses/Error422'
        '500':
          $ref: '#/components/responses/Error500'
    delete:
      tags:
        - Role Assignment
      security:
        - bearerAuth: []
      summary: Delete role assignment
      description: |
        Deletes the specified role assignment group within the workspace.
        This removes the entire group and all its associated role assignments.
      operationId: deleteRoleAssignment
      parameters:
        - $ref: '#/components/parameters/tenantPathParam'
        - $ref: '#/components/parameters/resourcePathParam'
        - $ref: '#/components/parameters/ifUnmodifiedSince'
      responses:
        '202':
          description: Role Assignment deletion accepted
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '409':
          $ref: '#/components/responses/Error409'
        '412':
          $ref: '#/components/responses/Error412'
        '500':
          $ref: '#/components/responses/Error500'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Use a JWT token for authentication. The token identifies the user,
        and policies (RBAC, ABAC, or hybrid) determine authorization.
  schemas:
    RoleIterator:
      description: Iterator for roles
      type: object
      required:
        - items
        - metadata
      properties:
        items:
          description: List of roles
          type: array
          items:
            $ref: '#/components/schemas/Role'
        metadata:
          $ref: '#/components/schemas/ResponseMetadata'
    RoleAssignmentIterator:
      description: Iterator for role assignments
      type: object
      required:
        - items
        - metadata
      properties:
        items:
          description: List of role assignments
          type: array
          items:
            $ref: '#/components/schemas/RoleAssignment'
        metadata:
          $ref: '#/components/schemas/ResponseMetadata'
    Labels:
      x-go-type-skip-optional-pointer: true
      type: object
      description: |
        User-defined key/value pairs that are mutable and can be used to
        organize and categorize resources. They can be used to filter resources.
        The number of labels is eventually limited by the CSP.
      additionalProperties:
        type: string
        maxLength: 63
      example:
        env: production
    Annotations:
      x-go-type-skip-optional-pointer: true
      type: object
      description: |
        User-defined key/value pairs that are mutable and can be used to add annotations.
        The number of annotations is eventually limited by the CSP.
      additionalProperties:
        type: string
        maxLength: 1024
      example:
        description: Human readable description
    Extensions:
      x-go-type-skip-optional-pointer: true
      type: object
      description: |
        User-defined key/value pairs that are mutable and can be used to add extensions.
        Extensions are subject to validation by the CSP, and any value that is not accepted will be rejected during admission.
      additionalProperties:
        type: string
    UserResourceMetadata:
      type: object
      description: Metadata for user-defined resource properties
      properties:
        labels:
          $ref: '#/components/schemas/Labels'
        annotations:
          $ref: '#/components/schemas/Annotations'
        extensions:
          $ref: '#/components/schemas/Extensions'
    NameMetadata:
      type: object
      readOnly: true
      required:
        - name
      description: Metadata for resource names
      properties:
        name:
          type: string
          description: |
            Resource identifier in dash-case (kebab-case) format. Must start and end with an alphanumeric character.
            Can contain lowercase letters, numbers, and hyphens. Multiple segments can be joined with dots.
            Each segment follows the same rules.
          minLength: 1
          maxLength: 128
          pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
          example: resource-name
    PermissionMetadata:
      type: object
      readOnly: true
      description: Metadata for permission management
      required:
        - provider
        - resource
        - verb
      properties:
        provider:
          type: string
          minLength: 1
          maxLength: 64
          example: seca.compute/v1
        resource:
          type: string
          minLength: 1
          maxLength: 256
          example: tenants/tn-1/workspaces/ws-1/instances/my-server
        verb:
          type: string
          minLength: 1
          maxLength: 7
          example: get
      example:
        provider: seca.compute/v1
        resource: tenants/tn-1/workspaces/ws-1/instances/my-server
        verb: get
    ModificationMetadata:
      type: object
      readOnly: true
      description: Base metadata for all resources with optional region references
      required:
        - createdAt
        - lastModifiedAt
        - resourceVersion
      properties:
        createdAt:
          type: string
          format: date-time
          description: Indicates the time when the resource was created. The field is set by the provider and should not be modified by the user.
        deletedAt:
          type: string
          format: date-time
          description: If set, indicates the time when the resource was marked for deletion. Resources with this field set are considered pending deletion.
        lastModifiedAt:
          type: string
          format: date-time
          description: Indicates the time when the resource was created or last modified. Field is used for "If-Unmodified-Since" logic for concurrency control. The provider guarantees that a modification on a single resource can happen only once every millisecond.
        resourceVersion:
          type: integer
          description: Incremented on every modification of the resource. Used for optimistic concurrency control.
          minimum: 1
          format: int64
    ReferenceURN:
      type: string
      minLength: 1
      description: |
        A unique resource name (URN) used to identify and reference this resource.

        The URN is NOT a URL — it does not contain a protocol scheme (http/https), a host,
        or any endpoint-specific prefix. It is a portable, transport-agnostic identifier.
        A configured SDK client — which knows the provider's base URL and endpoint mapping —
        can derive a URL from a URN, but the URN alone cannot be turned into a URL without
        that SDK configuration context. This separation keeps the URN portable across
        environments and CSP deployments.

        The full URN format is:
          `{provider}/{version}/tenants/{tenant}/workspaces/{workspace}/{type}/{name}`

        For hierarchical (nested) resources, additional parent path segments are included:
          `seca.network/v1/tenants/tn-1/workspaces/ws-1/networks/my-net/route-tables/my-rt`

        ### Automatic Prefix Inference

        In most cases, the prefix of the URN can be automatically derived in the given context.
        To simplify usage, only the resource type and name might be specified as a reference
        using the `<type>/<name>` notation. The suffix can be made more specific by adding
        additional segments separated by slashes.

        The prefix is automatically inferred from the context. For example, if the resource is a
        block storage in the same workspace the reference can be specified as
        `block-storages/my-block-storage`. If the resource is a block storage in a different workspace, the
        reference can be specified as `workspaces/ws-1/block-storages/my-block-storage`.

        For automatic prefix inference, the following rules apply:
        - the version is inferred from the current resource version
        - the workspace is inferred from the current workspace
        - the region is inferred from the current region
        - the provider is inferred from the type and context of the usage

        The prefix inference is resolved on admission into the full URN format, which makes it
        mostly suitable for human use.
      maxLength: 255
      example: seca.compute/v1/tenants/tn-1/workspaces/ws-1/instances/my-server
    TypeMetadata:
      type: object
      readOnly: true
      required:
        - apiVersion
        - kind
        - ref
      description: |
        Metadata for all resources with type information.
      properties:
        apiVersion:
          type: string
          description: API version of the resource
          minLength: 1
          maxLength: 16
          default: v1
        kind:
          type: string
          description: Type of the resource
          enum:
            - activity-log
            - block-storage
            - image
            - instance
            - instance-sku
            - internet-gateway
            - network
            - network-load-balancer
            - network-sku
            - nic
            - object-storage-account
            - public-ip
            - region
            - role
            - role-assignment
            - routing-table
            - security-group
            - security-group-rule
            - storage-sku
            - subnet
            - workspace
          x-enumNames:
            - ResourceKindActivityLog
            - ResourceKindBlockStorage
            - ResourceKindImage
            - ResourceKindInstance
            - ResourceKindInstanceSku
            - ResourceKindInternetGateway
            - ResourceKindNetwork
            - ResourceKindNetworkLoadBalancer
            - ResourceKindNetworkSku
            - ResourceKindNic
            - ResourceKindObjectStorageAccount
            - ResourceKindPublicIP
            - ResourceKindRegion
            - ResourceKindRole
            - ResourceKindRoleAssignment
            - ResourceKindRoutingTable
            - ResourceKindSecurityGroup
            - ResourceKindSecurityGroupRule
            - ResourceKindStorageSku
            - ResourceKindSubnet
            - ResourceKindWorkspace
        ref:
          $ref: '#/components/schemas/ReferenceURN'
    TenantMetadata:
      type: object
      description: Metadata for resources with tenant constraints
      readOnly: true
      required:
        - tenant
      properties:
        tenant:
          type: string
          description: Tenant identifier
          minLength: 1
          maxLength: 64
    GlobalTenantResourceMetadata:
      description: |
        Metadata for global resources with name, permission, modification, type, and tenant information.
      allOf:
        - $ref: '#/components/schemas/NameMetadata'
        - $ref: '#/components/schemas/PermissionMetadata'
        - $ref: '#/components/schemas/ModificationMetadata'
        - $ref: '#/components/schemas/TypeMetadata'
        - $ref: '#/components/schemas/TenantMetadata'
    Permission:
      type: object
      description: |
        Permission specification, including providers, resources, and verbs.
        Permissions are used to define access control policies for user accounts.
      required:
        - provider
        - resources
        - verb
      properties:
        provider:
          type: string
          description: |
            The provider for which the resource and verbs are defined.
          minLength: 1
          maxLength: 64
          example: seca.storage/v1
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-min-length: '1'
            x-kubebuilder-validation-max-length: '64'
        resources:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
            maxLength: 256
            x-oapi-codegen-extra-tags:
              x-kubebuilder-validation-max-length: '256'
          description: |
            The resources are the specific resources that the permission applies to.
            The resource can be a wildcard `*` to represent all resources or a
            specific resource type. For example, `images/my-image` or
            `images/*`.
          example:
            - images/*
            - skus/*
          maxItems: 256
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-items-min-length: '1'
            x-kubebuilder-validation-items-max-length: '256'
            x-kubebuilder-validation-min-items: '1'
            x-kubebuilder-validation-max-items: '256'
        verb:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
            maxLength: 7
            x-oapi-codegen-extra-tags:
              x-kubebuilder-validation-max-length: '7'
          description: |
            The verb is a string that represents the action to be performed on a resource.
            The standard operations are defined as `get`, `put`, `list`, `delete`. If the
            resource has additional actions they can to be permitted individually as
            verb and action in the form `<verb>:<action>`. For example, `post.start`,
            `post.stop`, `post.restart` or with a wildcard for all actions `post`.
          example:
            - read
            - write
          maxItems: 16
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-items-min-length: '1'
            x-kubebuilder-validation-items-max-length: '7'
            x-kubebuilder-validation-min-items: '1'
            x-kubebuilder-validation-max-items: '16'
    RoleSpec:
      type: object
      description: |
        Role specification defined as a list of permissions.
        Roles are used to define access control policies for
        a user account using a role assignment.
      required:
        - permissions
      properties:
        permissions:
          type: array
          minItems: 1
          maxItems: 256
          items:
            $ref: '#/components/schemas/Permission'
          description: List of permissions granted by this role
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-min-items: '1'
            x-kubebuilder-validation-max-items: '256'
          example:
            - provider: seca.storage/v1
              resources:
                - images/*
                - block-storages/*
              verb:
                - get
                - list
            - provider: seca.compute/v1
              resources:
                - instances/*
              verb:
                - get
                - list
            - provider: seca.network/v1
              resources:
                - networks/*
                - subnets/*
                - route-tables/*
                - nics/*
                - internet-gateways/*
                - security-groups/*
                - public-ips/*
              verb:
                - get
                - list
    ResourceState:
      type: string
      description: |
        Current phase of the resource:
        - pending: not available, waiting for other resources
        - creating: not available, creation started
        - active: available for data layer usage
        - updating: available for data layer usage
        - deleting: maybe still available for data layer user, can fail any moment
        - error: failed to fulfill the request; would be related to provider issue or customer related input.
      enum:
        - pending
        - creating
        - active
        - updating
        - deleting
        - error
      x-enumNames:
        - ResourceStatePending
        - ResourceStateCreating
        - ResourceStateActive
        - ResourceStateUpdating
        - ResourceStateDeleting
        - ResourceStateError
      example: active
    StatusCondition:
      type: object
      description: |
        StatusCondition describes the state of a resource at a certain point.
        Conditions are provider-specific and can represent different states depending on the
        resource type and provider implementation.
      required:
        - state
        - lastTransitionAt
      properties:
        state:
          $ref: '#/components/schemas/ResourceState'
        lastTransitionAt:
          type: string
          format: date-time
          description: |
            LastTransitionAt is the last time the condition transitioned from one
            status to another. This should be when the underlying condition changed.
            If that is not known, then using the time when the API field changed is
            acceptable.
        type:
          type: string
          x-go-type-skip-optional-pointer: true
          description: |
            Type of condition. The condition type is provider-specific and should
            reflect the specific states relevant to your resource.
        reason:
          type: string
          x-go-type-skip-optional-pointer: true
          description: |
            The reason for the condition's last transition in CamelCase.
            The specific set of reason values is provider-specific and should be
            documented by the provider.
          maxLength: 1024
          pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-max-length: '1024'
            x-kubebuilder-validation-pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
        message:
          type: string
          x-go-type-skip-optional-pointer: true
          description: |
            A human-readable message indicating details about the transition.
          maxLength: 32768
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-max-length: '32768'
      example:
        state: active
        lastTransitionAt: '2024-11-21T14:39:22Z'
    Status:
      type: object
      readOnly: true
      description: Current status of the resource
      required:
        - conditions
      properties:
        state:
          x-go-type-skip-optional-pointer: true
          allOf:
            - $ref: '#/components/schemas/ResourceState'
        conditions:
          type: array
          maxItems: 32
          items:
            $ref: '#/components/schemas/StatusCondition'
          x-oapi-codegen-extra-tags:
            x-kubebuilder-validation-max-items: '32'
    Role:
      description: |
        Role represents a set of permissions that can be assigned to users.
      allOf:
        - $ref: '#/components/schemas/UserResourceMetadata'
        - type: object
          required:
            - spec
          properties:
            metadata:
              $ref: '#/components/schemas/GlobalTenantResourceMetadata'
            spec:
              $ref: '#/components/schemas/RoleSpec'
            status:
              $ref: '#/components/schemas/Status'
    ResponseMetadata:
      description: |
