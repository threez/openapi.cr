name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint & compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: 1.20.2

      - name: Cache shards
        uses: actions/cache@v4
        with:
          path: lib
          key: ${{ runner.os }}-shards-${{ hashFiles('shard.lock') }}
          restore-keys: ${{ runner.os }}-shards-

      - run: shards install

      - name: Format check
        run: crystal tool format --check

      - name: Ameba lint
        run: lib/ameba/bin/ameba

      - name: Compile check
        run: crystal build src/openapi.cr -o /tmp/openapi_check --no-codegen

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: 1.20.2

      - name: Cache shards
        uses: actions/cache@v4
        with:
          path: lib
          key: ${{ runner.os }}-shards-${{ hashFiles('shard.lock') }}
          restore-keys: ${{ runner.os }}-shards-

      - run: shards install

      - name: Run specs
        run: crystal spec --order=random
